<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#155eef">
  <title>排班與工作站位 v0.1</title>
  <style>
    :root{--bg:#f4f7fb;--surface:#fff;--text:#172033;--muted:#6b7280;--line:#e5eaf2;--primary:#155eef;--primary-soft:#eaf1ff;--green:#168a52;--green-soft:#eaf8f0;--yellow:#b7791f;--yellow-soft:#fff7e6;--red:#d64545;--red-soft:#fff0f0;--shadow:0 12px 30px rgba(28,51,84,.10)}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif}button,input,select{font:inherit}a{text-decoration:none;color:inherit}.app{width:min(100%,720px);margin:auto;min-height:100vh;padding-bottom:96px}
    .hero{padding:12px 16px 18px;color:#fff;background:linear-gradient(145deg,#0f4fcb,#155eef 58%,#4a87ff);border-radius:0 0 28px 28px;box-shadow:0 14px 30px rgba(21,94,239,.23)}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px}.back{display:inline-flex;align-items:center;gap:7px;color:#fff;font-size:13px;background:rgba(255,255,255,.14);padding:9px 11px;border-radius:12px}.icon{width:40px;height:40px;border:0;border-radius:13px;background:rgba(255,255,255,.16);color:#fff}
    .store-row{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-top:12px}.store-name{margin:0;font-size:22px}.meta{margin-top:7px;font-size:12px;opacity:.88}.store-select{appearance:none;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.15);color:#fff;border-radius:12px;padding:8px 30px 8px 10px;font-size:12px;font-weight:800}.store-select option{color:#172033;background:#fff}
    main{padding:16px 14px 0}.section-title{display:flex;justify-content:space-between;align-items:center;margin:0 4px 10px}.section-title h2{margin:0;font-size:18px}.section-title span{font-size:11px;color:var(--muted)}.panel{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
    .date-tools{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.date-btn{border:0;border-radius:13px;min-height:44px;padding:0 14px;background:#eef2f7;font-weight:900}.date-input{width:100%;border:1px solid var(--line);border-radius:13px;background:#fafbfd;padding:10px 12px;text-align:center;font-weight:900}
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.summary{padding:11px;border:1px solid var(--line);border-radius:14px;background:#fafbfd}.summary small{display:block;font-size:9px;color:var(--muted)}.summary strong{display:block;margin-top:5px;font-size:17px}
    .notice{padding:11px 12px;border-radius:14px;background:var(--yellow-soft);color:#805b19;font-size:11px;line-height:1.55}
    .shift-list{display:grid;gap:10px}.shift-card{padding:13px;border:1px solid var(--line);border-radius:16px;background:#fafbfd}.shift-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.person{font-size:16px;font-weight:900}.dept-pill{padding:5px 8px;border-radius:999px;font-size:10px;font-weight:900}.dept-pill.foh{background:var(--primary-soft);color:var(--primary)}.dept-pill.boh{background:var(--green-soft);color:var(--green)}
    .shift-meta{margin-top:5px;font-size:11px;color:var(--muted);line-height:1.55}.station{margin-top:10px;padding:9px 10px;border-radius:12px;background:#fff;border:1px solid var(--line);font-size:12px}.station strong{color:var(--primary)}
    .flags{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}.flag{padding:5px 8px;border-radius:999px;font-size:10px;font-weight:850}.flag.late{background:var(--red-soft);color:var(--red)}.flag.leave{background:var(--yellow-soft);color:var(--yellow)}.flag.manager{background:var(--primary-soft);color:var(--primary)}.flag.ok{background:var(--green-soft);color:var(--green)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.small-btn{border:0;border-radius:11px;min-height:38px;font-size:11px;font-weight:850}.small-btn.secondary{background:#eef2f7;color:#445066}.small-btn.danger{background:var(--red-soft);color:var(--red)}
    .empty{padding:24px 12px;text-align:center;color:var(--muted);font-size:13px}
    .fab{position:fixed;right:max(18px,calc((100vw - 720px)/2 + 18px));bottom:calc(82px + env(safe-area-inset-bottom));width:58px;height:58px;border:0;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;box-shadow:0 14px 30px rgba(21,94,239,.35)}
    .modal{position:fixed;inset:0;z-index:50;background:rgba(8,13,24,.72);display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.modal-card{width:min(100%,720px);max-height:92vh;overflow:auto;background:#fff;border-radius:24px 24px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -18px 40px rgba(0,0,0,.22)}.modal-title{margin:0;font-size:20px}
    .field{display:grid;gap:6px;margin-top:12px}.field label{font-size:12px;font-weight:800}.input,select{width:100%;border:1px solid var(--line);border-radius:13px;background:#fafbfd;padding:11px 12px;color:var(--text)}.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.check-btn{border:1px solid var(--line);background:#fff;color:var(--muted);padding:10px 6px;border-radius:12px;font-size:11px;font-weight:850}.check-btn.active{color:var(--primary);border-color:#bfd0ff;background:var(--primary-soft)}.check-btn.active.danger{color:var(--red);border-color:#ffc7c7;background:var(--red-soft)}
    .form-actions{display:grid;grid-template-columns:1fr 1.2fr;gap:10px;margin-top:14px}.btn{border:0;border-radius:14px;min-height:48px;font-weight:900}.btn.secondary{background:#eef2f7;color:#445066}.btn.primary{background:var(--primary);color:#fff}
    nav{position:fixed;z-index:10;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,720px);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(10px)}.nav{border:0;background:transparent;min-height:56px;border-radius:14px;color:#8a94a4;font-size:11px}.nav.active{color:var(--primary);background:var(--primary-soft);font-weight:800}.nav b{display:block;font-size:18px;margin-bottom:4px}.toast{position:fixed;z-index:80;left:50%;bottom:108px;transform:translateX(-50%) translateY(18px);opacity:0;background:#172033;color:#fff;padding:10px 14px;border-radius:12px;font-size:13px;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:430px){.summary-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="top">
      <a class="back" id="backLink" href="dashboard.html">← Dashboard</a>
      <button class="icon" type="button" onclick="openShiftModal()">＋</button>
    </div>
    <div class="store-row">
      <div>
        <h1 class="store-name" id="pageTitle">排班與工作站位</h1>
        <div class="meta"><span id="todayText"></span> · 外場站位／內場人員</div>
      </div>
      <select class="store-select" id="storeSelect"></select>
    </div>
  </header>

  <main>
    <div class="section-title"><h2>日期</h2><span>查看與編輯當日班表</span></div>
    <section class="panel">
      <div class="date-tools">
        <button class="date-btn" type="button" onclick="moveDate(-1)">←</button>
        <input class="date-input" id="scheduleDate" type="date">
        <button class="date-btn" type="button" onclick="moveDate(1)">→</button>
      </div>
    </section>

    <div class="section-title"><h2>今日人力</h2><span id="staffLabel">0 人</span></div>
    <section class="panel">
      <div class="summary-grid">
        <div class="summary"><small>外場</small><strong id="fohCount">0</strong></div>
        <div class="summary"><small>內場</small><strong id="bohCount">0</strong></div>
        <div class="summary"><small>值班主管</small><strong id="managerCount">0</strong></div>
        <div class="summary"><small>總工時</small><strong id="totalHours">0h</strong></div>
      </div>
      <div class="notice" id="coverageNotice" style="margin-top:12px">尚未建立班表。</div>
    </section>

    <div class="section-title"><h2>外場站位</h2><span>人員＋工作位置</span></div>
    <section class="panel"><div class="shift-list" id="fohList"></div></section>

    <div class="section-title"><h2>內場人員</h2><span>只顯示當日上班人員</span></div>
    <section class="panel"><div class="shift-list" id="bohList"></div></section>
  </main>
</div>

<button class="fab" type="button" onclick="openShiftModal()">＋</button>

<div class="modal" id="shiftModal">
  <div class="modal-card">
    <h2 class="modal-title" id="modalTitle">新增班別</h2>
    <div class="field">
      <label for="personName">人員姓名</label>
      <input class="input" id="personName" placeholder="例如：海霞">
    </div>
    <div class="field">
      <label for="department">部門</label>
      <select id="department">
        <option value="foh">外場</option>
        <option value="boh">內場</option>
      </select>
    </div>
    <div class="field" id="stationField">
      <label for="station">外場工作站位</label>
      <select id="station">
        <option value="點餐">點餐</option>
        <option value="飲料">飲料</option>
        <option value="結帳">結帳</option>
        <option value="清機">清機</option>
        <option value="帶位">帶位</option>
        <option value="機動">機動</option>
      </select>
    </div>
    <div class="field">
      <label>排班時間</label>
      <div class="time-grid">
        <input class="input" id="startTime" type="time" value="10:00">
        <input class="input" id="endTime" type="time" value="18:00">
      </div>
    </div>
    <div class="field">
      <label>實際時間（獎金將使用這個工時）</label>
      <div class="time-grid">
        <input class="input" id="actualStart" type="time">
        <input class="input" id="actualEnd" type="time">
      </div>
    </div>
    <div class="field">
      <label>狀態</label>
      <div class="check-row">
        <button class="check-btn" id="managerBtn" type="button" onclick="toggleFlag('manager')">值班主管</button>
        <button class="check-btn danger" id="lateBtn" type="button" onclick="toggleFlag('late')">遲到</button>
        <button class="check-btn" id="leaveBtn" type="button" onclick="toggleFlag('leave')">請假／未到</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn secondary" type="button" onclick="closeShiftModal()">取消</button>
      <button class="btn primary" type="button" onclick="saveShift()">儲存班別</button>
    </div>
  </div>
</div>

<nav>
  <button class="nav" onclick="location.href='index.html'"><b>⌂</b>首頁</button>
  <button class="nav" onclick="location.href='dashboard.html'"><b>▦</b>Dashboard</button>
  <button class="nav active"><b>👥</b>排班</button>
  <button class="nav" onclick="location.href='events.html'"><b>!</b>事件</button>
  <button class="nav" onclick="location.href='orders.html'"><b>🧾</b>單據</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const SCHEDULE_KEY='store-manager-os-schedule-v1';
const STORE_OS_KEY='store-manager-os-v1';
const params=new URLSearchParams(location.search);
let storeKey=params.get('store')||'nansi';
const stores={nansi:{name:'南西店'},beiche:{name:'北車店'}};
if(!stores[storeKey])storeKey='nansi';

const formatDate=d=>[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
const todayKey=()=>formatDate(new Date());
let selectedDate=todayKey();
let editingId=null;
let flags={manager:false,late:false,leave:false};

function readRoot(){
  try{
    const parsed=JSON.parse(localStorage.getItem(SCHEDULE_KEY));
    return parsed&&typeof parsed==='object'?parsed:{};
  }catch{return {}}
}
function writeRoot(root){
  root.version=1;
  root.updatedAt=new Date().toISOString();
  localStorage.setItem(SCHEDULE_KEY,JSON.stringify(root));
}
function getShifts(){
  return readRoot()?.stores?.[storeKey]?.days?.[selectedDate]?.shifts||[];
}
function saveShifts(shifts){
  const root=readRoot();
  root.stores??={};
  root.stores[storeKey]??={days:{}};
  root.stores[storeKey].days??={};
  root.stores[storeKey].days[selectedDate]={shifts,updatedAt:new Date().toISOString()};
  writeRoot(root);
  syncDashboardStaff(shifts);
}
function minutes(value){
  if(!value)return null;
  const [h,m]=value.split(':').map(Number);
  return h*60+m;
}
function hoursBetween(start,end){
  const a=minutes(start),b=minutes(end);
  if(a===null||b===null)return 0;
  let diff=b-a;
  if(diff<0)diff+=24*60;
  return Math.max(0,diff/60);
}
function shiftHours(shift){
  if(shift.leave)return 0;
  return hoursBetween(shift.actualStart||shift.startTime,shift.actualEnd||shift.endTime);
}
function syncDashboardStaff(shifts){
  if(selectedDate!==todayKey())return;
  let root={};
  try{
    const parsed=JSON.parse(localStorage.getItem(STORE_OS_KEY));
    root=parsed&&typeof parsed==='object'?parsed:{};
  }catch{}
  root.stores??={};
  root.stores[storeKey]??={days:{}};
  root.stores[storeKey].days??={};
  const current=root.stores[storeKey].days[selectedDate]||{};
  const present=shifts.filter(s=>!s.leave);
  root.stores[storeKey].days[selectedDate]={
    ...current,
    date:selectedDate,
    staff:{
      scheduled:shifts.length,
      present:present.length,
      foh:present.filter(s=>s.department==='foh').length,
      boh:present.filter(s=>s.department==='boh').length
    },
    updatedAt:new Date().toISOString()
  };
  localStorage.setItem(STORE_OS_KEY,JSON.stringify(root));
}
function moveDate(offset){
  const d=new Date(selectedDate+'T12:00:00');
  d.setDate(d.getDate()+offset);
  selectedDate=formatDate(d);
  document.getElementById('scheduleDate').value=selectedDate;
  render();
}
function coverageMessage(shifts){
  const active=shifts.filter(s=>!s.leave);
  const foh=active.filter(s=>s.department==='foh');
  const stations=new Set(foh.map(s=>s.station));
  const missing=['點餐','飲料','結帳'].filter(x=>!stations.has(x));
  const manager=active.some(s=>s.manager);
  const notes=[];
  if(!manager)notes.push('尚未指定值班主管');
  if(!foh.length)notes.push('外場尚未排班');
  else if(missing.length)notes.push(`外場缺少：${missing.join('、')}`);
  if(!active.some(s=>s.department==='boh'))notes.push('內場尚未排班');
  return notes.length?notes.join('；'):'人力與基本站位已配置完成。';
}
function cardHtml(shift){
  const hours=shiftHours(shift);
  const time=`${shift.startTime}–${shift.endTime}`;
  const actual=(shift.actualStart||shift.actualEnd)?`實際 ${shift.actualStart||'--:--'}–${shift.actualEnd||'--:--'}`:'尚未填實際時間';
  const flagsHtml=[
    shift.manager?'<span class="flag manager">值班主管</span>':'',
    shift.late?'<span class="flag late">遲到・獎金 0</span>':'',
    shift.leave?'<span class="flag leave">請假／未到</span>':'',
    !shift.late&&!shift.leave?'<span class="flag ok">正常出勤</span>':''
  ].join('');
  return `<div class="shift-card">
    <div class="shift-head">
      <div>
        <div class="person">${escapeHtml(shift.name)}</div>
        <div class="shift-meta">${time} · ${actual}<br>有效工時 ${hours.toFixed(1)} 小時</div>
      </div>
      <span class="dept-pill ${shift.department}">${shift.department==='foh'?'外場':'內場'}</span>
    </div>
    ${shift.department==='foh'?`<div class="station">工作站位：<strong>${escapeHtml(shift.station||'未指定')}</strong></div>`:''}
    <div class="flags">${flagsHtml}</div>
    <div class="actions">
      <button class="small-btn secondary" type="button" onclick="editShift('${shift.id}')">修改</button>
      <button class="small-btn danger" type="button" onclick="removeShift('${shift.id}')">刪除</button>
    </div>
  </div>`;
}
function escapeHtml(value=''){
  return String(value).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function render(){
  const shifts=getShifts();
  const active=shifts.filter(s=>!s.leave);
  const foh=active.filter(s=>s.department==='foh');
  const boh=active.filter(s=>s.department==='boh');
  document.getElementById('pageTitle').textContent=`${stores[storeKey].name} 排班與工作站位`;
  document.getElementById('todayText').textContent=new Intl.DateTimeFormat('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'}).format(new Date(selectedDate+'T12:00:00'));
  document.getElementById('backLink').href=`dashboard.html?store=${encodeURIComponent(storeKey)}`;
  document.getElementById('scheduleDate').value=selectedDate;
  document.getElementById('staffLabel').textContent=`${active.length} 人出勤`;
  document.getElementById('fohCount').textContent=foh.length;
  document.getElementById('bohCount').textContent=boh.length;
  document.getElementById('managerCount').textContent=active.filter(s=>s.manager).length;
  document.getElementById('totalHours').textContent=active.reduce((sum,s)=>sum+shiftHours(s),0).toFixed(1)+'h';
  document.getElementById('coverageNotice').textContent=coverageMessage(shifts);
  document.getElementById('fohList').innerHTML=foh.length?foh.map(cardHtml).join(''):'<div class="empty">尚無外場人員。</div>';
  document.getElementById('bohList').innerHTML=boh.length?boh.map(cardHtml).join(''):'<div class="empty">尚無內場人員。</div>';
}
function openShiftModal(){
  editingId=null;
  flags={manager:false,late:false,leave:false};
  document.getElementById('modalTitle').textContent='新增班別';
  document.getElementById('personName').value='';
  document.getElementById('department').value='foh';
  document.getElementById('station').value='點餐';
  document.getElementById('startTime').value='10:00';
  document.getElementById('endTime').value='18:00';
  document.getElementById('actualStart').value='';
  document.getElementById('actualEnd').value='';
  updateDepartmentField();
  renderFlagButtons();
  document.getElementById('shiftModal').classList.add('show');
}
function closeShiftModal(){document.getElementById('shiftModal').classList.remove('show')}
function updateDepartmentField(){
  document.getElementById('stationField').style.display=document.getElementById('department').value==='foh'?'grid':'none';
}
function toggleFlag(key){
  flags[key]=!flags[key];
  if(key==='leave'&&flags.leave)flags.late=false;
  renderFlagButtons();
}
function renderFlagButtons(){
  document.getElementById('managerBtn').classList.toggle('active',flags.manager);
  document.getElementById('lateBtn').classList.toggle('active',flags.late);
  document.getElementById('leaveBtn').classList.toggle('active',flags.leave);
}
function saveShift(){
  const name=document.getElementById('personName').value.trim();
  const department=document.getElementById('department').value;
  const startTime=document.getElementById('startTime').value;
  const endTime=document.getElementById('endTime').value;
  if(!name)return toast('請填寫人員姓名');
  if(!startTime||!endTime)return toast('請填寫排班時間');
  const shifts=getShifts();
  const item={
    id:editingId||(crypto.randomUUID?crypto.randomUUID():String(Date.now())),
    name,department,
    station:department==='foh'?document.getElementById('station').value:'',
    startTime,endTime,
    actualStart:document.getElementById('actualStart').value,
    actualEnd:document.getElementById('actualEnd').value,
    manager:flags.manager,
    late:flags.late,
    leave:flags.leave,
    updatedAt:new Date().toISOString()
  };
  const index=shifts.findIndex(s=>s.id===editingId);
  if(index>=0)shifts[index]=item;else shifts.push(item);
  saveShifts(shifts);
  closeShiftModal();
  toast(index>=0?'班別已更新':'班別已新增');
  render();
}
function editShift(id){
  const shift=getShifts().find(s=>s.id===id);
  if(!shift)return;
  editingId=id;
  flags={manager:Boolean(shift.manager),late:Boolean(shift.late),leave:Boolean(shift.leave)};
  document.getElementById('modalTitle').textContent='修改班別';
  document.getElementById('personName').value=shift.name;
  document.getElementById('department').value=shift.department;
  document.getElementById('station').value=shift.station||'點餐';
  document.getElementById('startTime').value=shift.startTime;
  document.getElementById('endTime').value=shift.endTime;
  document.getElementById('actualStart').value=shift.actualStart||'';
  document.getElementById('actualEnd').value=shift.actualEnd||'';
  updateDepartmentField();
  renderFlagButtons();
  document.getElementById('shiftModal').classList.add('show');
}
function removeShift(id){
  const shifts=getShifts();
  const shift=shifts.find(s=>s.id===id);
  if(!shift||!confirm(`確定刪除 ${shift.name} 的班別？`))return;
  saveShifts(shifts.filter(s=>s.id!==id));
  toast('班別已刪除');
  render();
}

document.getElementById('scheduleDate').addEventListener('change',e=>{selectedDate=e.target.value||todayKey();render()});
document.getElementById('department').addEventListener('change',updateDepartmentField);
document.getElementById('shiftModal').addEventListener('click',e=>{if(e.target.id==='shiftModal')closeShiftModal()});

const storeSelect=document.getElementById('storeSelect');
storeSelect.innerHTML=Object.entries(stores).map(([key,s])=>`<option value="${key}" ${key===storeKey?'selected':''}>${s.name}</option>`).join('');
storeSelect.onchange=()=>{
  const url=new URL(location.href);
  url.searchParams.set('store',storeSelect.value);
  location.href=url.toString();
};

window.addEventListener('storage',e=>{if(e.key===SCHEDULE_KEY||e.key===STORE_OS_KEY)render()});
window.addEventListener('focus',render);

let toastTimer;
function toast(message){
  const el=document.getElementById('toast');
  el.textContent=message;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}
render();
</script>
</body>
