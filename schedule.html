<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#155eef">
  <title>排班與職務指定 v0.7</title>
  <style>
    :root{--bg:#f4f7fb;--surface:#fff;--text:#172033;--muted:#6b7280;--line:#e5eaf2;--primary:#155eef;--primary-soft:#eaf1ff;--green:#168a52;--green-soft:#eaf8f0;--yellow:#b7791f;--yellow-soft:#fff7e6;--red:#d64545;--red-soft:#fff0f0;--shadow:0 12px 30px rgba(28,51,84,.10)}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif}button,input,select{font:inherit}a{text-decoration:none;color:inherit}.app{width:min(100%,720px);margin:auto;min-height:100vh;padding-bottom:96px}

    .store-row{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-top:12px}.store-name{margin:0;font-size:22px}.meta{margin-top:7px;font-size:12px;opacity:.88}.store-select{appearance:none;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.15);color:#fff;border-radius:12px;padding:8px 30px 8px 10px;font-size:12px;font-weight:800}.store-select option{color:#172033;background:#fff}
    main{padding:16px 14px 0}.section-title{display:flex;justify-content:space-between;align-items:center;margin:0 4px 10px}.section-title h2{margin:0;font-size:18px}.section-title span{font-size:11px;color:var(--muted)}.panel{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
    .date-tools{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.date-btn{border:0;border-radius:13px;min-height:44px;padding:0 14px;background:#eef2f7;font-weight:900}.date-input{width:100%;border:1px solid var(--line);border-radius:13px;background:#fafbfd;padding:10px 12px;text-align:center;font-weight:900}
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.summary{padding:11px;border:1px solid var(--line);border-radius:14px;background:#fafbfd}.summary small{display:block;font-size:9px;color:var(--muted)}.summary strong{display:block;margin-top:5px;font-size:17px}

    .shift-meta{margin-top:5px;font-size:11px;color:var(--muted);line-height:1.55}.station{margin-top:10px;padding:9px 10px;border-radius:12px;background:#fff;border:1px solid var(--line);font-size:12px}.station strong{color:var(--primary)}
    .flags{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}.flag{padding:5px 8px;border-radius:999px;font-size:10px;font-weight:850}.flag.late{background:var(--red-soft);color:var(--red)}.flag.leave{background:var(--yellow-soft);color:var(--yellow)}.flag.manager{background:var(--primary-soft);color:var(--primary)}.flag.ok{background:var(--green-soft);color:var(--green)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.small-btn{border:0;border-radius:11px;min-height:38px;font-size:11px;font-weight:850}.small-btn.secondary{background:#eef2f7;color:#445066}.small-btn.danger{background:var(--red-soft);color:var(--red)}
    .empty{padding:24px 12px;text-align:center;color:var(--muted);font-size:13px}
    .fab{position:fixed;right:max(18px,calc((100vw - 720px)/2 + 18px));bottom:calc(82px + env(safe-area-inset-bottom));width:58px;height:58px;border:0;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;box-shadow:0 14px 30px rgba(21,94,239,.35)}
    .modal{position:fixed;inset:0;z-index:50;background:rgba(8,13,24,.72);display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.modal-card{width:min(100%,720px);max-height:92vh;overflow:auto;background:#fff;border-radius:24px 24px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -18px 40px rgba(0,0,0,.22)}.modal-title{margin:0;font-size:20px}
    .field{display:grid;gap:6px;margin-top:12px}.field label{font-size:12px;font-weight:800}.input,select{width:100%;border:1px solid var(--line);border-radius:13px;background:#fafbfd;padding:11px 12px;color:var(--text)}.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.break-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.break-btn{border:1px solid var(--line);background:#fff;color:var(--muted);min-height:40px;border-radius:11px;font-size:11px;font-weight:850}.break-btn.active{background:var(--primary-soft);border-color:#bfd0ff;color:var(--primary)}.hours-preview{padding:10px 12px;border-radius:12px;background:var(--green-soft);color:var(--green);font-size:12px;font-weight:850;line-height:1.5}.shift-code-row{display:grid;grid-template-columns:120px 1fr;gap:8px;align-items:center}.shift-code-badge{display:inline-flex;align-items:center;justify-content:center;min-height:44px;border-radius:12px;background:var(--primary-soft);color:var(--primary);font-weight:900}.shift-code-note{font-size:11px;color:var(--muted);line-height:1.45}.check-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.role-btn{border:1px solid var(--line);background:#fff;color:var(--muted);padding:10px 8px;border-radius:12px;font-size:11px;font-weight:850;text-align:left}.role-btn.active{color:var(--primary);border-color:#bfd0ff;background:var(--primary-soft)}.textarea{min-height:92px;resize:vertical}.line-preview{white-space:pre-wrap;background:#111827;color:#fff;border-radius:16px;padding:14px;font-size:12px;line-height:1.65;max-height:360px;overflow:auto}.copy-btn{width:100%;border:0;border-radius:14px;min-height:48px;background:var(--green);color:#fff;font-weight:900;margin-top:10px}.copy-tools{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.upload-box{border:1.5px dashed #bfd0ff;background:var(--primary-soft);border-radius:16px;padding:14px;text-align:center}.upload-box input{width:100%;font-size:12px}.import-status{margin-top:10px;padding:10px 12px;border-radius:12px;background:#fafbfd;border:1px solid var(--line);font-size:11px;line-height:1.55;color:var(--muted)}.import-status.good{background:var(--green-soft);color:var(--green)}.import-status.warn{background:var(--yellow-soft);color:var(--yellow)}.copy-tool{border:1px solid var(--line);background:#fff;color:var(--text);min-height:42px;border-radius:12px;font-size:11px;font-weight:850;padding:8px}.copy-tool.primary{background:var(--primary);border-color:var(--primary);color:#fff}.roster-row{display:grid;grid-template-columns:1fr auto;gap:8px}.roster-list{display:grid;gap:8px;margin-top:10px}.roster-item{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:7px;align-items:center;padding:9px 10px;border:1px solid var(--line);border-radius:13px;background:#fafbfd}.roster-main{min-width:0}.roster-name{font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.roster-dept{margin-top:3px;font-size:10px;color:var(--muted)}.roster-action{border:0;border-radius:9px;min-height:32px;padding:0 9px;font-size:10px;font-weight:850}.roster-action.edit{background:var(--primary-soft);color:var(--primary)}.roster-action.delete{background:var(--red-soft);color:var(--red)}.check-btn{border:1px solid var(--line);background:#fff;color:var(--muted);padding:10px 6px;border-radius:12px;font-size:11px;font-weight:850}.check-btn.active{color:var(--primary);border-color:#bfd0ff;background:var(--primary-soft)}.check-btn.active.danger{color:var(--red);border-color:#ffc7c7;background:var(--red-soft)}

    nav{position:fixed;z-index:10;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,720px);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(10px)}.nav{border:0;background:transparent;min-height:56px;border-radius:14px;color:#8a94a4;font-size:11px}.nav.active{color:var(--primary);background:var(--primary-soft);font-weight:800}.nav b{display:block;font-size:18px;margin-bottom:4px}.toast{position:fixed;z-index:80;left:50%;bottom:108px;transform:translateX(-50%) translateY(18px);opacity:0;background:#172033;color:#fff;padding:10px 14px;border-radius:12px;font-size:13px;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:430px){.summary-grid{grid-template-columns:repeat(2,1fr)}}

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<body>
<div class="app">
  <header class="hero">
    <div class="top">
      <a class="back" id="backLink" href="dashboard.html">← Dashboard</a>
      <button class="icon" type="button" onclick="openShiftModal()">＋</button>
    </div>
    <div class="store-row">
      <div>
        <h1 class="store-name" id="pageTitle">排班與職務指定</h1>
        <div class="meta"><span id="todayText"></span> · 外場多職務／內場人員／LINE 公告</div>
      </div>
      <select class="store-select" id="storeSelect"></select>
    </div>
  </header>

  <main>
    <div class="section-title"><h2>日期</h2><span>查看與編輯當日班表</span></div>
    <section class="panel">
      <div class="date-tools">
        <button class="date-btn" type="button" onclick="moveDate(-1)">←</button>
        <input class="date-input" id="scheduleDate" type="date">
        <button class="date-btn" type="button" onclick="moveDate(1)">→</button>
      </div>
    </section>

    <div class="section-title"><h2>Excel 匯入</h2><span>上傳後直接帶入目前日期</span></div>
    <section class="panel">
      <div class="upload-box">
        <input id="scheduleExcelFile" type="file" accept=".xlsx,.xls">
      </div>
      <div class="import-status" id="excelImportStatus">尚未選擇班表檔案。</div>
      <button class="btn primary" id="excelImportBtn" type="button" style="width:100%;margin-top:10px" onclick="importExcelForSelectedDate()">匯入目前日期班表</button>
    </section>

    <div class="section-title"><h2>快速建立</h2><span>減少每天重複輸入</span></div>
    <section class="panel">
      <div class="copy-tools">
        <button class="copy-tool" type="button" onclick="copyScheduleByOffset(-1)">複製昨天</button>
        <button class="copy-tool" type="button" onclick="copyScheduleByOffset(-7)">複製上週同日</button>
        <button class="copy-tool primary" type="button" onclick="openCopyDate()">選擇日期</button>
      </div>
      <input class="date-input" id="copySourceDate" type="date" style="margin-top:10px;display:none">
      <button class="btn primary" id="copySourceBtn" type="button" style="width:100%;margin-top:8px;display:none" onclick="copyFromSelectedDate()">確認複製</button>
    </section>

    <div class="section-title"><h2>員工名單</h2><span>點新增班別時直接選人</span></div>
    <section class="panel">
      <div class="roster-row">
        <input class="input" id="newRosterName" placeholder="新增員工姓名">
        <select id="newRosterDept" style="width:112px">
          <option value="">未指定</option>
          <option value="foh">外場</option>
          <option value="boh">內場</option>
        </select>
      </div>
      <button class="btn secondary" type="button" style="width:100%;margin-top:8px" onclick="addRosterMember()">加入員工名單</button>
      <div class="roster-list" id="rosterList"></div>
    </section>

    <div class="section-title"><h2>今日人力</h2><span id="staffLabel">0 人</span></div>
    <section class="panel">
      <div class="summary-grid">
        <div class="summary"><small>外場</small><strong id="fohCount">0</strong></div>
        <div class="summary"><small>內場</small><strong id="bohCount">0</strong></div>
        <div class="summary"><small>值班主管</small><strong id="managerCount">0</strong></div>
        <div class="summary"><small>總工時</small><strong id="totalHours">0h</strong></div>
      </div>
      <div class="notice" id="coverageNotice" style="margin-top:12px">尚未建立班表。</div>
    </section>

    <div class="section-title"><h2>外場職務</h2><span>每人可複選多個職務</span></div>
    <section class="panel"><div class="shift-list" id="fohList"></div></section>

    <div class="section-title"><h2>內場人員</h2><span>內場只需人員與值班領班</span></div>
    <section class="panel"><div class="shift-list" id="bohList"></div></section>

    <div class="section-title"><h2>訂位與追蹤</h2><span>產生 LINE 公告內容</span></div>
    <section class="panel">
      <div class="field" style="margin-top:0">
        <label for="reservationEarly">早班訂位</label>
        <textarea class="input textarea" id="reservationEarly" placeholder="例如：4人桌*3、8人桌*1"></textarea>
      </div>
      <div class="field">
        <label for="reservationLate">晚班訂位</label>
        <textarea class="input textarea" id="reservationLate" placeholder="例如：2人桌*1、4人桌*1"></textarea>
      </div>
      <div class="field">
        <label for="trackingNote">明天需追蹤事項</label>
        <textarea class="input textarea" id="trackingNote" placeholder="暫無"></textarea>
      </div>
      <button class="btn primary" type="button" style="width:100%;margin-top:12px" onclick="saveDayNotes()">儲存訂位與追蹤事項</button>
    </section>

    <div class="section-title"><h2>LINE 公告</h2><span>一鍵複製貼到群組</span></div>
    <section class="panel">
      <div class="line-preview" id="linePreview">尚未建立班表。</div>
      <button class="copy-btn" type="button" onclick="copyLinePost()">複製 LINE 公告</button>
    </section>

  </main>
</div>

<button class="fab" type="button" onclick="openShiftModal()">＋</button>

<div class="modal" id="shiftModal">
  <div class="modal-card">
    <h2 class="modal-title" id="modalTitle">新增班別</h2>
    <div class="field">
      <label for="personSelect">選擇員工</label>
      <select id="personSelect"></select>
    </div>
    <div class="field" id="customNameField" style="display:none">
      <label for="personName">自訂姓名</label>
      <input class="input" id="personName" placeholder="例如：新進員工">
    </div>
    <div class="field">
      <label for="department">部門</label>
      <select id="department">
        <option value="foh">外場</option>
        <option value="boh">內場</option>
      </select>
    </div>
    <div class="field" id="roleField">
      <label>外場／管理職務（可複選）</label>
      <div class="role-grid" id="roleGrid"></div>
    </div>
    <div class="field">
      <label>班別模板</label>
      <div class="shift-code-row">
        <select id="shiftCodeSelect">
          <option value="">自由設定</option>
          <option value="A">A 班</option>
          <option value="E">E 班</option>
          <option value="B">B 班</option>
          <option value="F">F 班</option>
          <option value="C">C 班</option>
          <option value="D">D 班</option>
          <option value="P3">P3 班</option>
        </select>
        <div class="shift-code-note" id="shiftCodeNote">選班別會自動帶入時間，也可直接用時鐘修改。</div>
      </div>
    </div>
    <div class="field">
      <label>排班時間</label>
      <div class="time-grid">
        <input class="input" id="startTime" type="time" value="10:00">
        <input class="input" id="endTime" type="time" value="18:00">
      </div>
    </div>
    <div class="field">
      <label>實際時間（獎金將使用這個工時）</label>
      <div class="time-grid">
        <input class="input" id="actualStart" type="time">
        <input class="input" id="actualEnd" type="time">
      </div>
    </div>
    <div class="field">
      <label>休息時間（從有效工時扣除）</label>
      <div class="break-grid">
        <button class="break-btn" type="button" data-break="0" onclick="setBreakMinutes(0)">不休息</button>
        <button class="break-btn" type="button" data-break="30" onclick="setBreakMinutes(30)">30 分鐘</button>
        <button class="break-btn" type="button" data-break="60" onclick="setBreakMinutes(60)">60 分鐘</button>
        <button class="break-btn" type="button" data-break="custom" onclick="showCustomBreak()">自訂</button>
      </div>
      <input class="input" id="customBreakMinutes" type="number" min="0" max="360" step="5" placeholder="輸入休息分鐘" style="display:none">
      <div class="hours-preview" id="hoursPreview">有效工時：--</div>
    </div>
    <div class="field">
      <label>狀態</label>
      <div class="check-row">
        <button class="check-btn" id="managerBtn" type="button" style="display:none"></button>
        <button class="check-btn danger" id="lateBtn" type="button" onclick="toggleFlag('late')">遲到</button>
        <button class="check-btn" id="leaveBtn" type="button" onclick="toggleFlag('leave')">請假／未到</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn secondary" type="button" onclick="closeShiftModal()">取消</button>
      <button class="btn primary" type="button" onclick="saveShift()">儲存班別</button>
    </div>
  </div>
</div>

<nav>
  <button class="nav" onclick="location.href='index.html'"><b>⌂</b>首頁</button>
  <button class="nav" onclick="location.href='dashboard.html'"><b>▦</b>Dashboard</button>
  <button class="nav active"><b>👥</b>排班</button>
  <button class="nav" onclick="location.href='events.html'"><b>!</b>事件</button>
  <button class="nav" onclick="location.href='orders.html'"><b>🧾</b>單據</button>
</nav>

<div class="toast" id="toast"></div>

<script>

const STORE_OS_KEY='store-manager-os-v1';
const ROSTER_KEY='store-manager-os-roster-v1';

const formatDate=d=>[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
const todayKey=()=>formatDate(new Date());
let selectedDate=todayKey();

const SHIFT_CODES={

function normalizeCell(value){
  return String(value??'').trim().replace(/\s+/g,'');
}
function excelDateKey(value){
  const text=normalizeCell(value);
  const match=text.match(/^(\d{1,2})\/(\d{1,2})/);
  return match?`${Number(match[1])}/${Number(match[2])}`:'';
}
function selectedMonthDay(){
  const d=new Date(selectedDate+'T12:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;

function setImportStatus(message,type=''){

}
function findScheduleSheet(workbook){
  const preferred=workbook.SheetNames.find(name=>name.includes('排班'));
  return preferred||workbook.SheetNames[0];
}
function findStoreBlocks(rows){
  const headers=[];
  rows.forEach((row,index)=>{
    if(normalizeCell(row?.[0])==='類型'&&normalizeCell(row?.[1])==='姓名')headers.push(index);
  });
  if(!headers.length)return {};
  const blocks={};
  const firstStart=headers[0]+1;
  const firstEnd=(headers[1]??rows.length)-1;
  blocks.nansi={header:headers[0],start:firstStart,end:firstEnd};
  if(headers[1]!==undefined)blocks.beiche={header:headers[1],start:headers[1]+1,end:rows.length-1};
  return blocks;
}
function getRosterDepartment(name){
  return getRoster().find(item=>item.name===name)?.department||'foh';
}
function createImportedShift(name,code){
  const times=SHIFT_CODES[code];
  const breakMinutes=suggestedBreakMinutes(times.startTime,times.endTime);
  return {
    id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),
    name,
    department:getRosterDepartment(name),
    roles:[],
    startTime:times.startTime,
    endTime:times.endTime,
    actualStart:'',
    actualEnd:'',
    breakMinutes,
    manager:false,
    late:false,
    leave:false,
    importedCode:code,
    sourceShiftCode:code,
    importedAt:new Date().toISOString(),
    updatedAt:new Date().toISOString()
  };
}
function parseSelectedDateFromWorkbook(){
  if(!importedWorkbook)throw new Error('請先選擇 Excel 班表');
  const sheetName=findScheduleSheet(importedWorkbook);
  const rows=XLSX.utils.sheet_to_json(importedWorkbook.Sheets[sheetName],{header:1,defval:''});
  const blocks=findStoreBlocks(rows);
  const block=blocks[storeKey];
  if(!block)throw new Error(`找不到${stores[storeKey].name}區塊`);
  const target=selectedMonthDay();
  const header=rows[block.header]||[];
  const dateCol=header.findIndex(cell=>excelDateKey(cell)===target);
  if(dateCol<0)throw new Error(`Excel 找不到 ${target} 欄位`);
  const shifts=[];
  const candidates=[];
  const skipped=[];
  const newNames=[];
  const rosterNames=new Set(getRoster().map(item=>item.name));
  for(let i=block.start;i<=block.end;i++){
    const row=rows[i]||[];
    const name=String(row[1]??'').trim();
    if(!name)continue;
    const raw=normalizeCell(row[dateCol]).toUpperCase();
    if(!raw)continue;
    if(raw.startsWith('候')){
      candidates.push(`${name} ${raw}`);
      continue;
    }
    if(['指休','公休','假','休'].includes(raw)){
      skipped.push(`${name} ${raw}`);
      continue;
    }
    if(!SHIFT_CODES[raw]){
      skipped.push(`${name} ${raw}`);
      continue;
    }
    shifts.push(createImportedShift(name,raw));
    if(!rosterNames.has(name))newNames.push(name);
  }
  return {sheetName,target,shifts,candidates,skipped,newNames};
}

function minutes(value){
  if(!value)return null;
  const [h,m]=value.split(':').map(Number);
  return h*60+m;
}
function hoursBetween(start,end){
  const a=minutes(start),b=minutes(end);
  if(a===null||b===null)return 0;
  let diff=b-a;
  if(diff<0)diff+=24*60;
  return Math.max(0,diff/60);
}
function detectShiftCode(start,end){
  const match=Object.entries(SHIFT_CODES).find(([,times])=>times.startTime===start&&times.endTime===end);
  return match?match[0]:'';
}
function applyShiftCode(code){
  const select=document.getElementById('shiftCodeSelect');
  const note=document.getElementById('shiftCodeNote');
  if(!code||!SHIFT_CODES[code]){
    select.value='';
    note.textContent='自由設定時間';
    updateImportedCodeFromTimes();
    return;
  }
  const times=SHIFT_CODES[code];
  document.getElementById('startTime').value=times.startTime;
  document.getElementById('endTime').value=times.endTime;
  selectedBreakMinutes=suggestedBreakMinutes(times.startTime,times.endTime);
  document.getElementById('customBreakMinutes').style.display='none';
  renderBreakButtons();
  updateHoursPreview();
  note.textContent=`${code} 班：${times.startTime}–${times.endTime}`;
}
function updateImportedCodeFromTimes(){
  const start=document.getElementById('startTime').value;
  const end=document.getElementById('endTime').value;
  const detected=detectShiftCode(start,end);
  const select=document.getElementById('shiftCodeSelect');
  const note=document.getElementById('shiftCodeNote');
  select.value=detected||'';
  note.textContent=detected?`${detected} 班：${start}–${end}`:`自訂時間：${start||'--:--'}–${end||'--:--'}`;
}

function suggestedBreakMinutes(start,end){
  const duration=hoursBetween(start,end);
  if(duration>8)return 60;
  if(duration>4)return 30;
  return 0;
}
function shiftHours(shift){
  if(shift.leave)return 0;
  const gross=hoursBetween(shift.actualStart||shift.startTime,shift.actualEnd||shift.endTime);
  const breakHours=Math.max(0,Number(shift.breakMinutes||0))/60;
  return Math.max(0,gross-breakHours);
}
function setBreakMinutes(value){
  selectedBreakMinutes=Math.max(0,Number(value)||0);
  document.getElementById('customBreakMinutes').style.display='none';
  renderBreakButtons();
  updateHoursPreview();
}

    const value=btn.dataset.break;
    const active=custom?value==='custom':value!=='custom'&&Number(value)===selectedBreakMinutes;
    btn.classList.toggle('active',active);
  });
}
function updateHoursPreview(){
  const start=document.getElementById('actualStart').value||document.getElementById('startTime').value;
  const end=document.getElementById('actualEnd').value||document.getElementById('endTime').value;
  const gross=hoursBetween(start,end);
  const effective=Math.max(0,gross-selectedBreakMinutes/60);
  document.getElementById('hoursPreview').textContent=`總時數 ${gross.toFixed(1)} 小時－休息 ${(selectedBreakMinutes/60).toFixed(selectedBreakMinutes%60?1:0)} 小時＝有效工時 ${effective.toFixed(1)} 小時`;
}

function coverageMessage(shifts){
  const active=shifts.filter(s=>!s.leave);
  const roles=new Set(active.flatMap(s=>s.roles||[]));
  const notes=[];
  if(!roles.has('店長')&&!roles.has('代理店長'))notes.push('尚未指定店長／代理店長');
  if(!roles.has('領檯'))notes.push('尚未指定領檯');
  if(!roles.has('吧台主責'))notes.push('尚未指定吧台主責');
  if(!roles.has('菜口主責'))notes.push('尚未指定菜口主責');
  if(!roles.has('清機主責'))notes.push('尚未指定清機主責');
  if(!active.some(s=>s.department==='boh'))notes.push('內場尚未排班');
  return notes.length?notes.join('；'):'當日主要職務已配置完成。';
}
function cardHtml(shift){
  const hours=shiftHours(shift);
  const time=`${shift.startTime}–${shift.endTime}`;
  const actual=(shift.actualStart||shift.actualEnd)?`實際 ${shift.actualStart||'--:--'}–${shift.actualEnd||'--:--'}`:'尚未填實際時間';
  const breakText=`休息 ${Number(shift.breakMinutes||0)} 分鐘`;
  const codeText=shift.importedCode?` · ${escapeHtml(shift.importedCode)} 班`:'';
  const flagsHtml=[
    ...(shift.roles||[]).map(role=>`<span class="flag manager">${escapeHtml(role)}</span>`),
    shift.late?'<span class="flag late">遲到・獎金 0</span>':'',
    shift.leave?'<span class="flag leave">請假／未到</span>':'',
    !shift.late&&!shift.leave?'<span class="flag ok">正常出勤</span>':''
  ].join('');
  return `<div class="shift-card">
    <div class="shift-head">
      <div>
        <div class="person">${escapeHtml(shift.name)}</div>
        <div class="shift-meta">${time}${codeText} · ${actual}<br>${breakText} · 有效工時 ${hours.toFixed(1)} 小時</div>
      </div>
      <span class="dept-pill ${shift.department}">${shift.department==='foh'?'外場':'內場'}</span>
    </div>
    
    <div class="flags">${flagsHtml}</div>
    <div class="actions">
      <button class="small-btn secondary" type="button" onclick="editShift('${shift.id}')">修改</button>
      <button class="small-btn danger" type="button" onclick="removeShift('${shift.id}')">刪除</button>

}

  const shifts=getShifts();
  const duplicate=shifts.find(s=>s.id!==editingId&&s.name===name);
  if(duplicate&&!confirm(`${name} 已經在這一天的班表中，仍要重複加入嗎？`))return;
  const item={
    id:editingId||(crypto.randomUUID?crypto.randomUUID():String(Date.now())),
    name,department,
    roles:[...selectedRoles],
    startTime,endTime,
    actualStart:document.getElementById('actualStart').value,
    actualEnd:document.getElementById('actualEnd').value,
    breakMinutes:selectedBreakMinutes,
    importedCode:detectShiftCode(startTime,endTime),
    manager:flags.manager,
    late:flags.late,
    leave:flags.leave,
    updatedAt:new Date().toISOString()
  };
  const index=shifts.findIndex(s=>s.id===editingId);
  if(index>=0)shifts[index]=item;else shifts.push(item);
  saveShifts(shifts);
  closeShiftModal();
  toast(index>=0?'班別已更新':'班別已新增');
  render();
}
function editShift(id){
  const shift=getShifts().find(s=>s.id===id);
  if(!shift)return;
  editingId=id;
  flags={manager:false,late:Boolean(shift.late),leave:Boolean(shift.leave)};
  selectedRoles=[...(shift.roles||[])];
  document.getElementById('modalTitle').textContent='修改班別';
  populatePersonSelect(shift.name);
  if(!getRoster().some(item=>item.name===shift.name)){
    document.getElementById('personSelect').value='__custom__';
    document.getElementById('personName').value=shift.name;
    toggleCustomName();
  }
  document.getElementById('department').value=shift.department;
  selectedRoles=[...(shift.roles||[])];
  document.getElementById('startTime').value=shift.startTime;
  document.getElementById('endTime').value=shift.endTime;
  document.getElementById('shiftCodeSelect').value=shift.importedCode&&SHIFT_CODES[shift.importedCode]?shift.importedCode:detectShiftCode(shift.startTime,shift.endTime);
  updateImportedCodeFromTimes();
  document.getElementById('actualStart').value=shift.actualStart||'';
  document.getElementById('actualEnd').value=shift.actualEnd||'';
  selectedBreakMinutes=Math.max(0,Number(shift.breakMinutes??suggestedBreakMinutes(shift.startTime,shift.endTime))||0);
  document.getElementById('customBreakMinutes').value=selectedBreakMinutes;
  document.getElementById('customBreakMinutes').style.display=[0,30,60].includes(selectedBreakMinutes)?'none':'block';
  renderBreakButtons(![0,30,60].includes(selectedBreakMinutes));
  updateHoursPreview();
  updateDepartmentField();
  renderRoleButtons();
  renderFlagButtons();
  document.getElementById('shiftModal').classList.add('show');
}
function removeShift(id){
  const shifts=getShifts();
  const shift=shifts.find(s=>s.id===id);
  if(!shift||!confirm(`確定刪除 ${shift.name} 的班別？`))return;
  saveShifts(shifts.filter(s=>s.id!==id));
  toast('班別已刪除');
  render();
}



function openCopyDate(){
  const input=document.getElementById('copySourceDate');
  const button=document.getElementById('copySourceBtn');
  input.style.display='block';
  button.style.display='block';
  input.value=selectedDate;
}
function copyScheduleByOffset(offset){
  const d=new Date(selectedDate+'T12:00:00');
  d.setDate(d.getDate()+offset);
  copyScheduleFrom(formatDate(d));
}
function copyFromSelectedDate(){
  const source=document.getElementById('copySourceDate').value;
  if(!source)return toast('請選擇來源日期');
  copyScheduleFrom(source);
}
function copyScheduleFrom(sourceDate){
  if(sourceDate===selectedDate)return toast('來源日期不能與目前日期相同');
  const source=readRoot()?.stores?.[storeKey]?.days?.[sourceDate];
  if(!source?.shifts?.length)return toast('來源日期沒有班表');
  if(getShifts().length&&!confirm('目前日期已有班表，複製後將覆蓋。確定繼續？'))return;
  const copied=source.shifts.map(shift=>({
    ...shift,
    id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),
    actualStart:'',
    actualEnd:'',
    breakMinutes:Number(shift.breakMinutes??suggestedBreakMinutes(shift.startTime,shift.endTime)),
    late:false,
    leave:false,
    updatedAt:new Date().toISOString()
  }));
  const root=readRoot();
  root.stores??={};
  root.stores[storeKey]??={days:{}};
  root.stores[storeKey].days??={};
  root.stores[storeKey].days[selectedDate]={
    shifts:copied,
    reservationEarly:'',
    reservationLate:'',
    trackingNote:'',
    copiedFrom:sourceDate,
    updatedAt:new Date().toISOString()
  };
  writeRoot(root);
  syncDashboardStaff(copied);
  toast(`已複製 ${sourceDate} 班表`);
  render();
}

function saveDayNotes(silent=false){
  const root=readRoot();
  root.stores??={};
  root.stores[storeKey]??={days:{}};
  root.stores[storeKey].days??={};
  const current=root.stores[storeKey].days[selectedDate]||{};
  root.stores[storeKey].days[selectedDate]={
    ...current,
    reservationEarly:document.getElementById('reservationEarly').value.trim(),
    reservationLate:document.getElementById('reservationLate').value.trim(),
    trackingNote:document.getElementById('trackingNote').value.trim(),
    updatedAt:new Date().toISOString()
  };
  writeRoot(root);
  if(!silent)toast('訂位與追蹤事項已儲存');
  if(!silent)render();
}
function displayTime(time){
  if(!time)return '';
  const [h,m]=time.split(':').map(Number);
  return m===0?String(h):`${h}.${m===30?'5':String(m).padStart(2,'0')}`;
}
function buildLinePost(){
  const shifts=getShifts().filter(s=>!s.leave);
  const day=getDayData();
  const d=new Date(selectedDate+'T12:00:00');
  const weekday=['日','一','二','三','四','五','六'][d.getDay()];
  const roleMap={};
  ROLE_OPTIONS.forEach(role=>roleMap[role]=[]);
  shifts.forEach(shift=>(shift.roles||[]).forEach(role=>{
    if(roleMap[role]&&!roleMap[role].includes(shift.name))roleMap[role].push(shift.name);
  }));
  const line=value=>value.length?value.map(name=>'@'+name).join(' / '):'';
  const roleLines=[
    `店長/代理店長: ${line([...roleMap['店長'],...roleMap['代理店長']])}`,
    `外場早班領班： ${line(roleMap['外場早班領班'])}`,
    `外場晚班領班： ${line(roleMap['外場晚班領班'])}`,
    `內場值班領班： ${line(roleMap['內場值班領班'])}`,
    `領檯：${line(roleMap['領檯'])}`,
    '',
    `吧台主責： ${line(roleMap['吧台主責'])}`,
    `菜口主責： ${line(roleMap['菜口主責'])}`,
    `清機主責： ${line(roleMap['清機主責'])}`
  ];
  const shiftLines=shifts
    .slice()
    .sort((a,b)=>minutes(a.startTime)-minutes(b.startTime))
    .map(s=>`@${s.name} ${displayTime(s.startTime)}-${displayTime(s.endTime)}`);
  const tomorrow=new Date();
  tomorrow.setDate(tomorrow.getDate()+1);
  const isTomorrow=selectedDate===formatDate(tomorrow);
  const reservationTitle=isTomorrow?'明日訂位':`${d.getMonth()+1}/${d.getDate()} 訂位`;
  const trackingTitle=isTomorrow?'明天需追蹤事項':`${d.getMonth()+1}/${d.getDate()} 需追蹤事項`;
  return `［${d.getMonth()+1}/${d.getDate()}（${weekday}）職務指定］

${roleLines.join('\n')}

${shiftLines.join('\n')}

${reservationTitle}：
早：
${day.reservationEarly||'暫無'}
晚：
${day.reservationLate||'暫無'}

${trackingTitle}：${day.trackingNote||'暫無'}`;
}
async function copyLinePost(){
  saveDayNotes(true);
  const missing=coverageMessage(getShifts());
  if(missing!=='當日主要職務已配置完成。'&&!confirm(`職務尚未完整：
${missing}

仍要複製 LINE 公告嗎？`))return;
  const text=buildLinePost();
  try{
    await navigator.clipboard.writeText(text);
    toast('LINE 公告已複製');
  }catch{
    const area=document.createElement('textarea');
    area.value=text;
    document.body.appendChild(area);
    area.select();
    document.execCommand('copy');
    area.remove();
    toast('LINE 公告已複製');
  }
}

document.getElementById('shiftCodeSelect').addEventListener('change',e=>applyShiftCode(e.target.value));
['startTime','endTime'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{
  selectedBreakMinutes=suggestedBreakMinutes(document.getElementById('startTime').value,document.getElementById('endTime').value);
  document.getElementById('customBreakMinutes').style.display='none';

  updateHoursPreview();

}));
['actualStart','actualEnd'].forEach(id=>document.getElementById(id).addEventListener('change',updateHoursPreview));
document.getElementById('customBreakMinutes').addEventListener('input',e=>{
  selectedBreakMinutes=Math.max(0,Number(e.target.value)||0);
  renderBreakButtons(true);
  updateHoursPreview();
});


document.getElementById('scheduleExcelFile').addEventListener('change',event=>{
  const file=event.target.files?.[0];
  importedWorkbook=null;
  importedFileName='';
  if(!file){
    setImportStatus('尚未選擇班表檔案。');
    return;
  }
  if(typeof XLSX==='undefined'){
    setImportStatus('Excel 解析元件載入失敗，請確認網路後重新整理。','warn');
    return;
  }
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      importedWorkbook=XLSX.read(e.target.result,{type:'array'});
      importedFileName=file.name;
      const sheet=findScheduleSheet(importedWorkbook);
      setImportStatus(`已讀取 ${file.name}；工作表：${sheet}。請選日期後按匯入。`,'good');
    }catch{
      setImportStatus('無法讀取這個 Excel 檔案。','warn');
    }
  };
  reader.onerror=()=>setImportStatus('讀取檔案失敗。','warn');
  reader.readAsArrayBuffer(file);
});

document.getElementById('scheduleDate').addEventListener('change',e=>{selectedDate=e.target.value||todayKey();render()});
document.getElementById('department').addEventListener('change',()=>{updateDepartmentField();renderRoleButtons()});
document.getElementById('personSelect').addEventListener('change',toggleCustomName);
document.getElementById('shiftModal').addEventListener('click',e=>{if(e.target.id==='shiftModal')closeShiftModal()});

const storeSelect=document.getElementById('storeSelect');
storeSelect.innerHTML=Object.entries(stores).map(([key,s])=>`<option value="${key}" ${key===storeKey?'selected':''}>${s.name}</option>`).join('');
storeSelect.onchange=()=>{
  const url=new URL(location.href);
  url.searchParams.set('store',storeSelect.value);
  location.href=url.toString();
};

window.addEventListener('storage',e=>{if(e.key===SCHEDULE_KEY||e.key===STORE_OS_KEY||e.key===ROSTER_KEY){renderRoster();render()}});
window.addEventListener('focus',render);

let toastTimer;
function toast(message){
  const el=document.getElementById('toast');
  el.textContent=message;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}
migrateLegacyRoster();
renderRoster();
populatePersonSelect();
renderRoleButtons();
render();
