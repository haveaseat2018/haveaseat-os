<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>have a sEAT Store OS</title>
<style>
:root{--bg:#f4f2ec;--card:#fff;--text:#243128;--muted:#6f786f;--line:#e4e6e1;--brand:#315c46;--brand-soft:#e8f0eb;--danger:#b23a3a;--warn:#a36b14}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:760px;margin:auto;min-height:100vh;padding-bottom:82px}
header{position:sticky;top:0;z-index:5;background:rgba(244,242,236,.96);backdrop-filter:blur(8px);padding:15px 16px 10px;border-bottom:1px solid var(--line)}
h1{font-size:20px;margin:0}.sub{font-size:13px;color:var(--muted);margin-top:4px}
main{padding:14px}.page{display:none}.page.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.section{font-weight:700;font-size:15px;margin-bottom:10px}
.badge{display:inline-flex;padding:6px 9px;border-radius:999px;background:var(--brand-soft);color:var(--brand);font-size:12px;margin:3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{background:#fafafa;border:1px solid var(--line);border-radius:14px;padding:13px}.metric b{display:block;font-size:22px;margin-top:4px}
.list{display:flex;flex-direction:column}.item{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}
input,select,textarea{width:100%;padding:11px;border:1px solid #cfd5cf;border-radius:11px;background:#fff;font:inherit}
input[type=checkbox]{width:20px;height:20px;accent-color:var(--brand)}
button{border:0;border-radius:11px;padding:11px 13px;font:inherit;font-weight:700}.primary{background:var(--brand);color:white}.secondary{background:#edf0ed}.danger{background:var(--danger);color:#fff}.small{padding:8px 10px;font-size:13px}.full{width:100%}
label{display:block;font-size:13px;color:var(--muted);margin:10px 0 6px}
.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(760px,100%);display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:10}
.nav button{background:none;color:var(--muted);font-size:11px;padding:6px 2px}.nav button.active{color:var(--brand)}.ico{display:block;font-size:20px;margin-bottom:2px}
.note{font-size:13px;color:var(--muted);line-height:1.5}.empty{text-align:center;color:var(--muted);padding:20px 8px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;align-items:flex-end;justify-content:center}.modal.open{display:flex}
.sheet{width:min(760px,100%);max-height:90vh;overflow:auto;background:var(--bg);border-radius:22px 22px 0 0;padding:16px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="app">
<header>
<div class="row"><div><h1>have a sEAT Store OS</h1><div class="sub" id="today"></div></div><span class="badge">南西店 v0.1</span></div>
</header>
<main>
<section id="home" class="page active">
<div class="card">
<div class="row"><div><div class="note">今日值班主管</div><b id="managerText">尚未設定</b></div><button class="secondary small" onclick="openManager()">設定</button></div>
<hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
<div class="section">今日上班</div><div id="todayStaff"></div>
</div>
<div class="grid">
<div class="metric"><span class="note">今日人數</span><b id="staffCount">0</b></div>
<div class="metric"><span class="note">Checklist</span><b id="checkPct">0%</b></div>
<div class="metric"><span class="note">重大事件</span><b id="incidentCount">0</b></div>
<div class="metric"><span class="note">獎金池</span><b id="bonusPoolText">$0</b></div>
</div>
<div class="card"><div class="section">今日店經理摘要</div><div id="summary"></div></div>
</section>

<section id="staff" class="page">
<div class="card">
<div class="row"><div class="section" style="margin:0">員工主檔</div><button class="primary small" onclick="addEmployee()">＋新增</button></div>
<div class="note" style="margin-top:8px">建立一次，之後每天只勾選誰上班。</div>
<div id="employeeList" class="list"></div>
</div>
</section>

<section id="schedule" class="page">
<div class="card">
<div class="section">今日排班</div>
<div class="note">勾選今天有上班的人，並設定班別與工時。</div>
<div id="scheduleList" class="list"></div>
<button class="primary full" onclick="saveData();alert('今日排班已儲存')">儲存今日排班</button>
</div>
</section>

<section id="manage" class="page">
<div class="card">
<div class="section">店長每日管理 Checklist</div>
<div id="checkList" class="list"></div>
</div>
<div class="card">
<div class="row"><div class="section" style="margin:0">重大事件</div><button class="danger small" onclick="openIncident()">＋回報</button></div>
<div id="incidentList"></div>
</div>
</section>

<section id="bonus" class="page">
<div class="card">
<div class="section">今日獎金</div>
<label>當日獎金池</label><input type="number" id="bonusPool" min="0" step="1" oninput="updateBonus()">
<div class="note" style="margin-top:8px">遲到或不具獎金資格者，取消勾選「有資格」。</div>
<div id="bonusList" class="list"></div>
<div class="card" style="margin-top:12px;background:#fafafa">
<div class="row"><span>總有效工時</span><b id="totalHours">0</b></div>
<div class="row"><span>每小時獎金</span><b id="hourRate">$0</b></div>
</div>
</div>
</section>
</main>

<nav class="nav">
<button class="active" onclick="showPage('home',this)"><span class="ico">🏠</span>總覽</button>
<button onclick="showPage('staff',this)"><span class="ico">👥</span>員工</button>
<button onclick="showPage('schedule',this)"><span class="ico">📅</span>排班</button>
<button onclick="showPage('manage',this)"><span class="ico">✅</span>管理</button>
<button onclick="showPage('bonus',this)"><span class="ico">💰</span>獎金</button>
</nav>
</div>

<div class="modal" id="managerModal"><div class="sheet">
<div class="row"><h2 style="font-size:18px;margin:0">設定值班主管</h2><button class="secondary small" onclick="closeModal('managerModal')">關閉</button></div>
<label>主管姓名</label><input id="managerInput"><button class="primary full" style="margin-top:12px" onclick="saveManager()">儲存</button>
</div></div>

<div class="modal" id="incidentModal"><div class="sheet">
<div class="row"><h2 style="font-size:18px;margin:0">回報重大事件</h2><button class="secondary small" onclick="closeModal('incidentModal')">關閉</button></div>
<label>事件類型</label><select id="incidentType"><option>客訴</option><option>退款</option><option>餐點重做</option><option>食安</option><option>設備</option><option>缺貨</option><option>員工</option><option>其他</option></select>
<label>內容</label><textarea id="incidentDesc" rows="5"></textarea>
<label>需要店經理介入</label><select id="incidentHelp"><option value="否">否</option><option value="是">是</option></select>
<button class="danger full" style="margin-top:12px" onclick="saveIncident()">送出</button>
</div></div>

<script>
const K='haveaseat_store_os_v01';
const defaultEmployees=['張耀徽','易海霞','黃昱泰','陳安思','李易達','鄭丞豈','鍾沄軒','鄭伊婷','陳宇豪','王律雅','徐辰茵','周佳芬','郭芯妤（Elva）','張胤一（Poseidon）','周芷妤','楊育佳','寧子宸（Patria）','陳永鈞','王紹安'];
let data=JSON.parse(localStorage.getItem(K)||'null')||{
manager:'',employees:defaultEmployees.map(n=>({name:n,active:true})),
schedule:{},checklist:[
{text:'確認今日排班與臨時異動',done:false},
{text:'確認尖峰站位與工作分配',done:false},
{text:'確認今日客訴、退款、重做',done:false},
{text:'確認設備、缺貨、食安異常',done:false},
{text:'確認需店經理介入事項已回報',done:false},
{text:'完成今日營運摘要',done:false}
],incidents:[],bonusPool:0
};
function saveData(){localStorage.setItem(K,JSON.stringify(data));render()}
document.getElementById('today').textContent=new Intl.DateTimeFormat('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'}).format(new Date());

function render(){
document.getElementById('managerText').textContent=data.manager||'尚未設定';
document.getElementById('employeeList').innerHTML=data.employees.map((e,i)=>`<div class="item"><div style="flex:1"><b>${e.name}</b><div class="note">${e.active?'在職':'停用'}</div></div><button class="secondary small" onclick="toggleEmployee(${i})">${e.active?'停用':'啟用'}</button></div>`).join('');
document.getElementById('scheduleList').innerHTML=data.employees.filter(e=>e.active).map(e=>{
let s=data.schedule[e.name]||{working:false,shift:'A',hours:8,eligible:true};
return `<div class="item" style="align-items:flex-start"><input type="checkbox" ${s.working?'checked':''} onchange="setWorking('${escq(e.name)}',this.checked)"><div style="flex:1"><b>${e.name}</b><div class="two" style="margin-top:7px"><select onchange="setShift('${escq(e.name)}',this.value)"><option ${s.shift==='A'?'selected':''}>A</option><option ${s.shift==='B'?'selected':''}>B</option><option ${s.shift==='C'?'selected':''}>C</option><option ${s.shift==='D'?'selected':''}>D</option><option ${s.shift==='P3'?'selected':''}>P3</option><option ${s.shift==='自訂'?'selected':''}>自訂</option></select><input type="number" min="0" step="0.5" value="${s.hours}" onchange="setHours('${escq(e.name)}',this.value)"></div></div></div>`}).join('');
const working=Object.entries(data.schedule).filter(([n,s])=>s.working);
document.getElementById('todayStaff').innerHTML=working.length?working.map(([n,s])=>`<span class="badge">${n}｜${s.shift}｜${s.hours}h</span>`).join(''):'<div class="empty">尚未設定今日排班</div>';
document.getElementById('staffCount').textContent=working.length;
document.getElementById('checkList').innerHTML=data.checklist.map((x,i)=>`<label class="item" style="margin:0;color:var(--text)"><input type="checkbox" ${x.done?'checked':''} onchange="data.checklist[${i}].done=this.checked;saveData()"><span>${x.text}</span></label>`).join('');
let pct=Math.round(data.checklist.filter(x=>x.done).length/data.checklist.length*100);document.getElementById('checkPct').textContent=pct+'%';
document.getElementById('incidentCount').textContent=data.incidents.length;
document.getElementById('incidentList').innerHTML=data.incidents.length?data.incidents.map(x=>`<div class="item"><div><b>${x.type}${x.help==='是'?'｜需店經理介入':''}</b><div class="note">${x.desc}</div></div></div>`).join(''):'<div class="empty">今日無重大事件</div>';
document.getElementById('bonusPool').value=data.bonusPool||0;document.getElementById('bonusPoolText').textContent='$'+Math.round(data.bonusPool||0).toLocaleString();
renderBonus();
const help=data.incidents.filter(x=>x.help==='是').length;
document.getElementById('summary').innerHTML=`<p>今日上班：<b>${working.length} 人</b></p><p>Checklist：<b>${pct}%</b></p><p>重大事件：<b>${data.incidents.length} 件</b></p><p>需店經理介入：<b>${help} 件</b></p>`;
}
function escq(s){return s.replace(/'/g,"\\'")}
function addEmployee(){let n=prompt('員工姓名');if(n){data.employees.push({name:n,active:true});saveData()}}
function toggleEmployee(i){data.employees[i].active=!data.employees[i].active;saveData()}
function ensure(n){if(!data.schedule[n])data.schedule[n]={working:false,shift:'A',hours:8,eligible:true};return data.schedule[n]}
function setWorking(n,v){ensure(n).working=v;saveData()}
function setShift(n,v){ensure(n).shift=v;saveData()}
function setHours(n,v){ensure(n).hours=Number(v)||0;saveData()}
function openManager(){document.getElementById('managerInput').value=data.manager;document.getElementById('managerModal').classList.add('open')}
function saveManager(){data.manager=document.getElementById('managerInput').value.trim();closeModal('managerModal');saveData()}
function openIncident(){document.getElementById('incidentModal').classList.add('open')}
function saveIncident(){let d=document.getElementById('incidentDesc').value.trim();if(!d)return alert('請填事件內容');data.incidents.unshift({type:document.getElementById('incidentType').value,desc:d,help:document.getElementById('incidentHelp').value});document.getElementById('incidentDesc').value='';closeModal('incidentModal');saveData()}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function updateBonus(){data.bonusPool=Number(document.getElementById('bonusPool').value)||0;saveData()}
function renderBonus(){
let arr=Object.entries(data.schedule).filter(([n,s])=>s.working);
let total=arr.reduce((a,[n,s])=>a+(s.eligible?s.hours:0),0);
let rate=total?data.bonusPool/total:0;
document.getElementById('bonusList').innerHTML=arr.length?arr.map(([n,s])=>`<div class="item"><input type="checkbox" ${s.eligible?'checked':''} onchange="ensure('${escq(n)}').eligible=this.checked;saveData()"><div style="flex:1"><b>${n}</b><div class="note">${s.hours} 小時｜${s.eligible?'有資格':'獎金 0'}</div></div><b>$${Math.round(s.eligible?s.hours*rate:0).toLocaleString()}</b></div>`).join(''):'<div class="empty">請先設定今日排班</div>';
document.getElementById('totalHours').textContent=total+'h';document.getElementById('hourRate').textContent='$'+Math.round(rate).toLocaleString();
}
function showPage(id,btn){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));btn.classList.add('active');window.scrollTo(0,0)}
render();
</script>
</body>
</html>
