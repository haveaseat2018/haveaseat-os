<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>have a sEAT Store OS v0.2</title>
<style>
:root{
  --bg:#f4f2ec;--card:#fff;--text:#243128;--muted:#6f786f;--line:#e3e6e1;
  --brand:#315c46;--brand2:#244534;--soft:#e8f0eb;--danger:#b23a3a;--warn:#9a6b13;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:780px;margin:auto;min-height:100vh;padding-bottom:86px}
header{position:sticky;top:0;z-index:5;background:rgba(244,242,236,.96);backdrop-filter:blur(8px);padding:14px 16px 10px;border-bottom:1px solid var(--line)}
h1{font-size:20px;margin:0}.sub{font-size:13px;color:var(--muted);margin-top:4px}
main{padding:14px}.page{display:none}.page.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.section{font-weight:800;font-size:16px;margin-bottom:10px}
.badge{display:inline-flex;padding:6px 9px;border-radius:999px;background:var(--soft);color:var(--brand);font-size:12px;margin:3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{background:#fafafa;border:1px solid var(--line);border-radius:14px;padding:13px}.metric b{display:block;font-size:22px;margin-top:4px}
.item{padding:12px 0;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}
input,select,textarea{width:100%;padding:11px;border:1px solid #cfd5cf;border-radius:11px;background:#fff;font:inherit}
input[type=checkbox]{width:20px;height:20px;accent-color:var(--brand)}
input[type=file]{padding:8px;background:#fafafa}
button{border:0;border-radius:11px;padding:11px 13px;font:inherit;font-weight:800}.primary{background:var(--brand);color:white}.secondary{background:#edf0ed}.danger{background:var(--danger);color:#fff}.small{padding:8px 10px;font-size:13px}.full{width:100%}
label{display:block;font-size:13px;color:var(--muted);margin:10px 0 6px}
.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(780px,100%);display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:10}
.nav button{background:none;color:var(--muted);font-size:11px;padding:6px 2px}.nav button.active{color:var(--brand)}.ico{display:block;font-size:20px;margin-bottom:2px}
.note{font-size:13px;color:var(--muted);line-height:1.55}.empty{text-align:center;color:var(--muted);padding:20px 8px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three{display:grid;grid-template-columns:1.1fr .7fr .7fr;gap:8px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;align-items:flex-end;justify-content:center}.modal.open{display:flex}
.sheet{width:min(780px,100%);max-height:92vh;overflow:auto;background:var(--bg);border-radius:22px 22px 0 0;padding:16px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.tabs button.active{background:var(--brand);color:#fff}
.stephead{display:flex;align-items:center;gap:10px;margin-bottom:12px}.stepnum{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:var(--brand);color:#fff;font-weight:900}
.progress{height:8px;background:#e8ebe7;border-radius:999px;overflow:hidden;margin:10px 0 16px}.progress>div{height:100%;background:var(--brand);width:0}
.checkitem{border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px;background:#fff}.checkitem.done{border-color:#9fc2ab;background:#f4faf6}
.req{color:var(--danger);font-weight:700}.ok{color:var(--brand);font-weight:800}.warn{color:var(--warn);font-weight:800}
.preview{display:none;width:100%;max-height:240px;object-fit:cover;border-radius:12px;margin-top:8px;border:1px solid var(--line)}
.kpi{font-size:26px;font-weight:900}
hr{border:0;border-top:1px solid var(--line);margin:14px 0}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="row">
    <div><h1>have a sEAT Store OS</h1><div class="sub" id="today"></div></div>
    <span class="badge">南西店 v0.2</span>
  </div>
</header>

<main>
<section id="home" class="page active">
  <div class="card">
    <div class="row">
      <div><div class="note">今日值班主管</div><b id="managerText">尚未設定</b></div>
      <button class="secondary small" onclick="openManager()">設定</button>
    </div>
    <hr>
    <div class="section">今日上班</div>
    <div id="todayStaff"></div>
  </div>

  <div class="grid">
    <div class="metric"><span class="note">今日人數</span><b id="staffCount">0</b></div>
    <div class="metric"><span class="note">總實際工時</span><b id="actualHoursTotal">0h</b></div>
    <div class="metric"><span class="note">開店進度</span><b id="openPct">0%</b></div>
    <div class="metric"><span class="note">關店進度</span><b id="closePct">0%</b></div>
  </div>

  <div class="card">
    <div class="section">今日摘要</div>
    <div id="summary"></div>
  </div>
</section>

<section id="staff" class="page">
  <div class="card">
    <div class="row">
      <div class="section" style="margin:0">員工主檔</div>
      <button class="primary small" onclick="addEmployee()">＋新增</button>
    </div>
    <div class="note" style="margin-top:8px">員工建立一次，之後每天只需要排班。</div>
    <div id="employeeList"></div>
  </div>
</section>

<section id="schedule" class="page">
  <div class="card">
    <div class="section">今日排班</div>
    <div class="note">固定班別會自動帶入正常工時；加班另外手動填寫。</div>
    <div id="scheduleList"></div>
    <button class="primary full" onclick="saveData();alert('今日排班已儲存')">儲存今日排班</button>
  </div>
</section>

<section id="check" class="page">
  <div class="tabs">
    <button id="openTab" class="active" onclick="switchChecklist('open')">開店 Checklist</button>
    <button id="closeTab" class="secondary" onclick="switchChecklist('close')">關店 Checklist</button>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <div class="section" id="checkTitle" style="margin:0">開店 Checklist</div>
        <div class="note" id="checkHint">需依序完成，必要項目必須填數值或拍照。</div>
      </div>
      <span class="badge" id="checkCounter">0/0</span>
    </div>
    <div class="progress"><div id="progressBar"></div></div>
    <div id="checklistFlow"></div>
  </div>
</section>

<section id="bonus" class="page">
  <div class="card">
    <div class="section">今日獎金</div>
    <label>當日獎金池</label>
    <input type="number" id="bonusPool" min="0" step="1" oninput="updateBonus()">
    <div class="note" style="margin-top:8px">遲到者獎金直接為 0；主管可手動取消或恢復資格。</div>
    <div id="bonusList"></div>
    <div class="card" style="margin-top:12px;background:#fafafa">
      <div class="row"><span>總有效工時</span><b id="totalHours">0h</b></div>
      <div class="row"><span>每小時獎金</span><b id="hourRate">$0</b></div>
    </div>
  </div>
</section>
</main>

<nav class="nav">
  <button class="active" onclick="showPage('home',this)"><span class="ico">🏠</span>總覽</button>
  <button onclick="showPage('staff',this)"><span class="ico">👥</span>員工</button>
  <button onclick="showPage('schedule',this)"><span class="ico">📅</span>排班</button>
  <button onclick="showPage('check',this)"><span class="ico">✅</span>開關店</button>
  <button onclick="showPage('bonus',this)"><span class="ico">💰</span>獎金</button>
</nav>
</div>

<div class="modal" id="managerModal">
  <div class="sheet">
    <div class="row"><h2 style="font-size:18px;margin:0">設定值班主管</h2><button class="secondary small" onclick="closeModal('managerModal')">關閉</button></div>
    <label>主管姓名</label><input id="managerInput">
    <button class="primary full" style="margin-top:12px" onclick="saveManager()">儲存</button>
  </div>
</div>

<script>
const KEY='haveaseat_store_os_v02';
const defaultEmployees=['張耀徽','易海霞','黃昱泰','陳安思','李易達','鄭丞豈','鍾沄軒','鄭伊婷','陳宇豪','王律雅','徐辰茵','周佳芬','郭芯妤（Elva）','張胤一（Poseidon）','周芷妤','楊育佳','寧子宸（Patria）','陳永鈞','王紹安'];

const shifts={
  '10-19':8,
  '11-20':8,
  '11.5-15.5':4,
  '12-21':8,
  '12.5-21.5':8,
  '13-22':8,
  '13.5-22.5':8,
  '18-22':4
};

const openTemplate=[
  {id:'open_staff',title:'人員到班確認',type:'choice',required:true,help:'確認開早兩位人員是否準時到班；有人遲到必須註記。'},
  {id:'open_fridge1',title:'冷藏冰箱 1 溫度',type:'temp_photo',required:true,min:0,max:7,help:'輸入實際溫度並拍攝溫度顯示器。'},
  {id:'open_fridge2',title:'冷藏冰箱 2 溫度',type:'temp_photo',required:true,min:0,max:7,help:'輸入實際溫度並拍攝溫度顯示器。'},
  {id:'open_freezer',title:'冷凍冰箱溫度',type:'temp_photo',required:true,min:-25,max:-12,help:'輸入實際溫度並拍攝溫度顯示器。'},
  {id:'open_equipment',title:'設備開機確認',type:'text_photo',required:true,help:'確認 POS、製冰機、咖啡機、保溫設備與照明空調。'},
  {id:'open_shortage',title:'今日缺貨與異常',type:'text',required:true,help:'沒有缺貨也請填「無」。'},
  {id:'open_clean',title:'前場與工作區清潔',type:'photo',required:true,help:'拍攝開店前整體狀態。'}
];

const closeTemplate=[
  {id:'close_fridge1',title:'冷藏冰箱 1 關店溫度',type:'temp_photo',required:true,min:0,max:7,help:'輸入溫度並拍攝顯示器。'},
  {id:'close_fridge2',title:'冷藏冰箱 2 關店溫度',type:'temp_photo',required:true,min:0,max:7,help:'輸入溫度並拍攝顯示器。'},
  {id:'close_freezer',title:'冷凍冰箱關店溫度',type:'temp_photo',required:true,min:-25,max:-12,help:'輸入溫度並拍攝顯示器。'},
  {id:'close_food',title:'食材加蓋與日期標示',type:'photo',required:true,help:'拍攝冰箱內部與標示狀態。'},
  {id:'close_clean',title:'工作台與設備清潔',type:'photo',required:true,help:'拍攝關店後清潔完成狀態。'},
  {id:'close_cash',title:'POS 結帳與現金差異',type:'number_text',required:true,help:'輸入差異金額；若非 0 必須填原因。'},
  {id:'close_safety',title:'電源、門窗與保全',type:'choice_photo',required:true,help:'確認不需供電設備已關閉、門窗上鎖並拍照。'},
  {id:'close_summary',title:'今日異常與交接',type:'text',required:true,help:'沒有異常也請填「無」。'}
];

let data=JSON.parse(localStorage.getItem(KEY)||'null')||{
  manager:'',
  employees:defaultEmployees.map(n=>({name:n,active:true})),
  schedule:{},
  checklist:{open:{},close:{}},
  bonusPool:0
};

let currentChecklist='open';
document.getElementById('today').textContent=new Intl.DateTimeFormat('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'}).format(new Date());

function saveData(){
  try{localStorage.setItem(KEY,JSON.stringify(data))}catch(e){alert('照片太多，手機暫存空間不足。正式版會改存雲端。')}
  render();
}
function escq(s){return String(s).replace(/'/g,"\\'")}
function ensureSchedule(name){
  if(!data.schedule[name]) data.schedule[name]={working:false,shift:'10-19',normal:8,overtime:0,late:false,eligible:true};
  return data.schedule[name];
}
function actualHours(s){return Number(s.normal||0)+Number(s.overtime||0)}
function shiftOptions(selected){
  return Object.keys(shifts).map(x=>`<option value="${x}" ${x===selected?'selected':''}>${x}</option>`).join('');
}

function render(){
  document.getElementById('managerText').textContent=data.manager||'尚未設定';

  document.getElementById('employeeList').innerHTML=data.employees.map((e,i)=>`
    <div class="item row">
      <div><b>${e.name}</b><div class="note">${e.active?'在職':'停用'}</div></div>
      <button class="secondary small" onclick="toggleEmployee(${i})">${e.active?'停用':'啟用'}</button>
    </div>`).join('');

  document.getElementById('scheduleList').innerHTML=data.employees.filter(e=>e.active).map(e=>{
    const s=ensureSchedule(e.name);
    return `<div class="item">
      <div class="row">
        <label style="margin:0;color:var(--text);display:flex;align-items:center;gap:9px">
          <input type="checkbox" ${s.working?'checked':''} onchange="setWorking('${escq(e.name)}',this.checked)">
          <b>${e.name}</b>
        </label>
        <span class="badge">${actualHours(s)}H</span>
      </div>
      ${s.working?`
      <div class="three" style="margin-top:10px">
        <div><label>班別</label><select onchange="setShift('${escq(e.name)}',this.value)">${shiftOptions(s.shift)}</select></div>
        <div><label>正常</label><input value="${s.normal}" disabled></div>
        <div><label>加班</label><input type="number" min="0" step="0.5" value="${s.overtime}" onchange="setOvertime('${escq(e.name)}',this.value)"></div>
      </div>
      <div class="two">
        <label style="display:flex;align-items:center;gap:8px;color:var(--text)">
          <input type="checkbox" ${s.late?'checked':''} onchange="setLate('${escq(e.name)}',this.checked)"> 遲到
        </label>
        <div><label>實際工時</label><input value="${actualHours(s)} H" disabled></div>
      </div>`:''}
    </div>`;
  }).join('');

  const working=Object.entries(data.schedule).filter(([n,s])=>s.working);
  document.getElementById('todayStaff').innerHTML=working.length
    ?working.map(([n,s])=>`<span class="badge">${n}｜${s.shift}｜${actualHours(s)}H${s.late?'｜遲到':''}</span>`).join('')
    :'<div class="empty">尚未設定今日排班</div>';

  document.getElementById('staffCount').textContent=working.length;
  document.getElementById('actualHoursTotal').textContent=working.reduce((a,[n,s])=>a+actualHours(s),0)+'h';

  renderChecklist();
  renderBonus();

  const openP=completion(openTemplate,'open'), closeP=completion(closeTemplate,'close');
  document.getElementById('openPct').textContent=openP+'%';
  document.getElementById('closePct').textContent=closeP+'%';
  document.getElementById('summary').innerHTML=`
    <p>今日上班：<b>${working.length} 人</b></p>
    <p>總實際工時：<b>${working.reduce((a,[n,s])=>a+actualHours(s),0)} 小時</b></p>
    <p>遲到人員：<b>${working.filter(([n,s])=>s.late).length} 人</b></p>
    <p>開店 Checklist：<b>${openP}%</b></p>
    <p>關店 Checklist：<b>${closeP}%</b></p>`;
}

function setWorking(n,v){ensureSchedule(n).working=v;saveData()}
function setShift(n,v){const s=ensureSchedule(n);s.shift=v;s.normal=shifts[v];saveData()}
function setOvertime(n,v){ensureSchedule(n).overtime=Math.max(0,Number(v)||0);saveData()}
function setLate(n,v){const s=ensureSchedule(n);s.late=v;if(v)s.eligible=false;saveData()}
function addEmployee(){const n=prompt('員工姓名');if(n){data.employees.push({name:n.trim(),active:true});saveData()}}
function toggleEmployee(i){data.employees[i].active=!data.employees[i].active;saveData()}

function openManager(){document.getElementById('managerInput').value=data.manager;document.getElementById('managerModal').classList.add('open')}
function saveManager(){data.manager=document.getElementById('managerInput').value.trim();closeModal('managerModal');saveData()}
function closeModal(id){document.getElementById(id).classList.remove('open')}

function switchChecklist(type){
  currentChecklist=type;
  document.getElementById('openTab').className=type==='open'?'active':'secondary';
  document.getElementById('closeTab').className=type==='close'?'active':'secondary';
  renderChecklist();
}
function getTemplate(){return currentChecklist==='open'?openTemplate:closeTemplate}
function getEntry(id){
  if(!data.checklist[currentChecklist][id]) data.checklist[currentChecklist][id]={value:'',note:'',photo:'',choice:'',done:false};
  return data.checklist[currentChecklist][id];
}
function completion(template,type){
  const entries=data.checklist[type]||{};
  const done=template.filter(x=>entries[x.id]&&entries[x.id].done).length;
  return Math.round(done/template.length*100);
}
function renderChecklist(){
  const template=getTemplate();
  const done=template.filter(x=>getEntry(x.id).done).length;
  document.getElementById('checkTitle').textContent=currentChecklist==='open'?'開店 Checklist':'關店 Checklist';
  document.getElementById('checkCounter').textContent=`${done}/${template.length}`;
  document.getElementById('progressBar').style.width=(done/template.length*100)+'%';

  document.getElementById('checklistFlow').innerHTML=template.map((it,index)=>{
    const e=getEntry(it.id);
    let fields='';
    if(it.type.includes('temp')){
      const num=Number(e.value);
      const abnormal=e.value!==''&&(num<it.min||num>it.max);
      fields+=`<label>實際溫度 <span class="req">必填</span></label>
      <input type="number" step="0.1" value="${e.value}" oninput="setCheckValue('${it.id}',this.value)">
      ${e.value!==''?`<div class="${abnormal?'warn':'ok'}" style="margin-top:6px">${abnormal?'⚠ 溫度異常，請填處理方式':'✓ 溫度在設定範圍'}</div>`:''}`;
      if(abnormal) fields+=`<label>異常處理方式 <span class="req">必填</span></label><textarea rows="3" oninput="setCheckNote('${it.id}',this.value)">${e.note||''}</textarea>`;
    }
    if(it.type==='choice'||it.type==='choice_photo'){
      fields+=`<label>確認結果 <span class="req">必填</span></label>
      <select onchange="setCheckChoice('${it.id}',this.value)">
        <option value="">請選擇</option>
        <option ${e.choice==='正常'?'selected':''}>正常</option>
        <option ${e.choice==='異常'?'selected':''}>異常</option>
      </select>`;
      if(e.choice==='異常') fields+=`<label>異常說明 <span class="req">必填</span></label><textarea rows="3" oninput="setCheckNote('${it.id}',this.value)">${e.note||''}</textarea>`;
    }
    if(it.type==='text'||it.type==='text_photo'){
      fields+=`<label>內容 <span class="req">必填</span></label><textarea rows="3" oninput="setCheckNote('${it.id}',this.value)">${e.note||''}</textarea>`;
    }
    if(it.type==='number_text'){
      fields+=`<label>現金差異金額 <span class="req">必填</span></label><input type="number" value="${e.value}" oninput="setCheckValue('${it.id}',this.value)">
      ${Number(e.value)!==0&&e.value!==''?`<label>差異原因 <span class="req">必填</span></label><textarea rows="3" oninput="setCheckNote('${it.id}',this.value)">${e.note||''}</textarea>`:''}`;
    }
    if(it.type.includes('photo')){
      fields+=`<label>現場照片 <span class="req">必拍</span></label>
      <input type="file" accept="image/*" capture="environment" onchange="loadPhoto('${it.id}',this)">
      <img id="img_${it.id}" class="preview" ${e.photo?`src="${e.photo}" style="display:block"`:''}>`;
    }
    return `<div class="checkitem ${e.done?'done':''}">
      <div class="stephead"><div class="stepnum">${index+1}</div><div><b>${it.title}</b><div class="note">${it.help}</div></div></div>
      ${fields}
      <button class="${e.done?'secondary':'primary'} full" style="margin-top:12px" onclick="completeCheck('${it.id}')">${e.done?'已完成（點擊重新檢查）':'確認完成'}</button>
    </div>`;
  }).join('');
}
function setCheckValue(id,v){getEntry(id).value=v;saveData()}
function setCheckNote(id,v){getEntry(id).note=v;saveData()}
function setCheckChoice(id,v){getEntry(id).choice=v;saveData()}
function loadPhoto(id,input){
  const f=input.files&&input.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{getEntry(id).photo=reader.result;saveData()};
  reader.readAsDataURL(f);
}
function validateCheck(item,e){
  if(item.type.includes('temp')){
    if(e.value==='') return '請輸入溫度';
    const n=Number(e.value);
    if((n<item.min||n>item.max)&&!e.note.trim()) return '溫度異常，請填處理方式';
  }
  if((item.type==='choice'||item.type==='choice_photo')&&!e.choice) return '請選擇確認結果';
  if((item.type==='choice'||item.type==='choice_photo')&&e.choice==='異常'&&!e.note.trim()) return '請填異常說明';
  if((item.type==='text'||item.type==='text_photo')&&!e.note.trim()) return '請填寫內容';
  if(item.type==='number_text'){
    if(e.value==='') return '請輸入現金差異金額';
    if(Number(e.value)!==0&&!e.note.trim()) return '差異非 0，請填原因';
  }
  if(item.type.includes('photo')&&!e.photo) return '必須拍照後才能完成';
  return '';
}
function completeCheck(id){
  const item=getTemplate().find(x=>x.id===id), e=getEntry(id);
  if(e.done){e.done=false;saveData();return}
  const msg=validateCheck(item,e); if(msg){alert(msg);return}
  e.done=true;saveData();
}

function updateBonus(){data.bonusPool=Number(document.getElementById('bonusPool').value)||0;saveData()}
function setEligible(n,v){ensureSchedule(n).eligible=v;saveData()}
function renderBonus(){
  document.getElementById('bonusPool').value=data.bonusPool||0;
  const arr=Object.entries(data.schedule).filter(([n,s])=>s.working);
  arr.forEach(([n,s])=>{if(s.late)s.eligible=false});
  const total=arr.reduce((a,[n,s])=>a+(s.eligible?actualHours(s):0),0);
  const rate=total?data.bonusPool/total:0;
  document.getElementById('bonusList').innerHTML=arr.length?arr.map(([n,s])=>`
    <div class="item row">
      <div style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" ${s.eligible?'checked':''} ${s.late?'disabled':''} onchange="setEligible('${escq(n)}',this.checked)">
        <div><b>${n}</b><div class="note">${actualHours(s)} 小時｜${s.late?'遲到，獎金 0':s.eligible?'有資格':'獎金 0'}</div></div>
      </div>
      <b>$${Math.round(s.eligible?actualHours(s)*rate:0).toLocaleString()}</b>
    </div>`).join(''):'<div class="empty">請先設定今日排班</div>';
  document.getElementById('totalHours').textContent=total+'h';
  document.getElementById('hourRate').textContent='$'+Math.round(rate).toLocaleString();
}
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo(0,0);
}
render();
</script>
</body>
