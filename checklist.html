<html lang="zh-Hant">
<head>

  <title>Store Checklist v0.6</title>
  <style>
    :root{--bg:#f4f7fb;--surface:#fff;--text:#172033;--muted:#6b7280;--line:#e5eaf2;--primary:#155eef;--primary-soft:#eaf1ff;--green:#168a52;--green-soft:#eaf8f0;--yellow:#b7791f;--yellow-soft:#fff7e6;--red:#d64545;--red-soft:#fff0f0;--shadow:0 12px 30px rgba(28,51,84,.10)}
    *{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif}button,input,textarea,select{font:inherit}.app{width:min(100%,720px);margin:auto;min-height:100vh;padding-bottom:100px}

    .top{display:flex;justify-content:space-between;align-items:center;gap:12px}.back{display:inline-flex;align-items:center;gap:7px;color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,.14);padding:9px 11px;border-radius:12px}.icon{width:40px;height:40px;border:0;border-radius:13px;background:rgba(255,255,255,.16);color:#fff}.store-row{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-top:12px}.store-name{margin:0;font-size:22px}.meta{margin-top:7px;font-size:12px;opacity:.88}.store-select{appearance:none;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.15);color:#fff;border-radius:12px;padding:8px 30px 8px 10px;font-size:12px;font-weight:800}.store-select option{color:#172033;background:#fff}
    main{padding:16px 14px 0}.panel{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}.section-title{display:flex;justify-content:space-between;align-items:center;margin:0 4px 10px}.section-title h2{margin:0;font-size:18px}.section-title span{font-size:11px;color:var(--muted)}
    .type-tabs,.dept-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tab{border:1px solid var(--line);background:#fff;color:var(--muted);padding:11px;border-radius:13px;font-weight:850}.tab.active{color:var(--primary);border-color:#bfd0ff;background:var(--primary-soft)}
    .progress-head{display:flex;justify-content:space-between;font-size:12px;font-weight:800;margin-bottom:8px}.progress-track{height:10px;border-radius:999px;background:#e5eaf2;overflow:hidden}.progress-bar{height:100%;width:0;background:var(--primary);transition:.2s}
    .status-box{margin-top:12px;padding:11px 12px;border-radius:14px;background:var(--yellow-soft);color:#815717;font-size:12px;line-height:1.55}.status-box.done{background:var(--green-soft);color:var(--green)}
    .checklist{display:grid;gap:9px}.check-row{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:start;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fafbfd}.check-row.checked{background:#f4fbf7;border-color:#cfeadd}.check-row input{position:absolute;opacity:0}.box{width:28px;height:28px;border-radius:9px;border:2px solid #b7c1d1;background:#fff;display:grid;place-items:center;font-weight:900;color:#fff}.check-row.checked .box{background:var(--green);border-color:var(--green)}.item-title{font-size:14px;font-weight:800;line-height:1.45}.item-sub{margin-top:3px;font-size:11px;color:var(--muted);line-height:1.45}.photo-card{padding:13px;border:1px solid var(--line);border-radius:16px;background:#fafbfd}.photo-card.done{background:#f4fbf7;border-color:#cfeadd}.photo-head{display:flex;align-items:flex-start;gap:10px}.photo-index{width:30px;height:30px;flex:0 0 30px;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;font-weight:900}.photo-card.done .photo-index{background:var(--green);color:#fff}.photo-body{min-width:0;flex:1}.photo-actions{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:11px}.photo-upload{display:flex;align-items:center;justify-content:center;gap:7px;min-height:44px;border-radius:12px;background:var(--primary);color:#fff;font-weight:900;cursor:pointer}.photo-upload input{display:none}.photo-remove{border:0;border-radius:12px;padding:0 13px;background:#eef2f7;color:#566176;font-weight:850}.photo-preview{display:block;width:100%;max-height:240px;object-fit:cover;border-radius:13px;margin-top:11px;border:1px solid var(--line);background:#eef2f7}.photo-meta{margin-top:7px;font-size:11px;color:var(--green);font-weight:800}.photo-required{color:var(--red);font-size:11px;font-weight:900;margin-left:4px}.photo-preview{cursor:zoom-in}.operator-card{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}.history-tools{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}.date-input{width:100%;border:1px solid var(--line);border-radius:13px;background:#fafbfd;padding:11px 12px;color:var(--text);font-weight:800}.today-btn{border:0;border-radius:13px;min-height:44px;padding:0 14px;background:var(--primary-soft);color:var(--primary);font-weight:900}.recent-days{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:12px}.day-chip{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 3px;color:var(--muted);font-size:10px;font-weight:850;line-height:1.35}.day-chip strong{display:block;color:var(--text);font-size:13px}.day-chip.active{border-color:#9db8ff;background:var(--primary-soft);color:var(--primary)}.day-chip.active strong{color:var(--primary)}.day-chip .day-status{display:block;margin-top:3px;font-size:9px}.readonly-banner{display:none;margin-top:12px;padding:11px 12px;border-radius:14px;background:#eef2f7;color:#566176;font-size:12px;font-weight:800}.readonly-banner.show{display:block}.read-only .photo-upload,.read-only .photo-remove{display:none}.read-only .check-row{pointer-events:none}.read-only input:not(#dateSelect),.read-only textarea{pointer-events:none;background:#f3f5f8;color:#5c6677}.read-only .save-bar{display:none}.storage-status{margin-top:10px;padding:10px 12px;border-radius:13px;background:#f6f8fb;color:var(--muted);font-size:11px;line-height:1.5}.storage-status.warn{background:var(--yellow-soft);color:#815717}.storage-status.danger{background:var(--red-soft);color:var(--red)}.completed-lock .photo-upload,.completed-lock .photo-remove{display:none}.completed-lock .check-row{pointer-events:none}.completed-lock input:not(#dateSelect),.completed-lock textarea{pointer-events:none;background:#f3f5f8;color:#5c6677}.review-box{display:none;margin-top:12px;padding:12px;border-radius:14px;background:var(--red-soft);color:var(--red);font-size:12px;line-height:1.55}.review-box.show{display:block}.audit-list{display:grid;gap:8px}.audit-row{padding:10px 12px;border:1px solid var(--line);border-radius:13px;background:#fafbfd}.audit-title{font-size:12px;font-weight:900}.audit-meta{margin-top:3px;font-size:10px;color:var(--muted)}.audit-empty{font-size:12px;color:var(--muted);text-align:center;padding:10px}.return-btn{width:100%;border:0;border-radius:14px;min-height:46px;background:var(--red-soft);color:var(--red);font-weight:900}.modal{position:fixed;inset:0;z-index:70;background:rgba(8,13,24,.72);display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.modal-card{width:min(100%,720px);background:#fff;border-radius:24px 24px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -18px 40px rgba(0,0,0,.22)}.modal-title{margin:0 0 12px;font-size:19px}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.operator-hint{font-size:11px;color:var(--muted);line-height:1.45}.viewer{position:fixed;inset:0;z-index:60;background:rgba(8,13,24,.94);display:none;align-items:center;justify-content:center;padding:18px}.viewer.show{display:flex}.viewer-content{width:min(100%,760px);max-height:92vh;display:grid;gap:10px}.viewer-image{display:block;width:100%;max-height:78vh;object-fit:contain;border-radius:14px;background:#111827}.viewer-meta{color:#fff;text-align:center;font-size:13px;line-height:1.5}.viewer-close{position:absolute;top:calc(14px + env(safe-area-inset-top));right:14px;width:44px;height:44px;border:0;border-radius:50%;background:rgba(255,255,255,.17);color:#fff;font-size:24px}
    .field{display:grid;gap:6px;margin-top:12px}.field label{font-size:12px;font-weight:800}.input,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#fafbfd;padding:11px 12px;color:var(--text)}textarea{min-height:84px;resize:vertical}.signature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.signature-card{padding:12px;border:1px solid var(--line);border-radius:15px;background:#fafbfd}.signature-card label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px}.signature-card input{width:100%;border:0;border-bottom:1px solid #bfc8d6;background:transparent;padding:8px 2px;font-weight:800;outline:none}
    .save-bar{position:fixed;z-index:10;bottom:0;left:50%;transform:translateX(-50%);width:min(100%,720px);padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(10px);display:grid;grid-template-columns:1fr 1.35fr;gap:10px}.btn{border:0;border-radius:14px;min-height:48px;font-weight:900}.btn.secondary{background:#eef2f7;color:#445066}.btn.primary{background:var(--primary);color:#fff}.btn[disabled]{opacity:.55}
    .toast{position:fixed;z-index:30;left:50%;bottom:88px;transform:translateX(-50%) translateY(18px);opacity:0;background:#172033;color:#fff;padding:10px 14px;border-radius:12px;font-size:13px;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:430px){.store-row{align-items:flex-start}.signature-grid{grid-template-columns:1fr}.save-bar{grid-template-columns:.9fr 1.1fr}}
  </style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="top">
      <a class="back" id="backLink" href="dashboard_v1.0.1.html">← Dashboard</a>
      <button class="icon" type="button" onclick="resetCurrent()" aria-label="重設">↺</button>
    </div>
    <div class="store-row">
      <div>
        <h1 class="store-name" id="pageTitle">Checklist</h1>
        <div class="meta"><span id="today"></span> · <span id="saveState">尚未修改</span></div>
      </div>
      <select class="store-select" id="storeSelect" aria-label="切換分店"></select>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="type-tabs">
        <button class="tab" id="openTab" type="button">☀️ 開店</button>
        <button class="tab" id="closeTab" type="button">🌙 關店</button>
      </div>
      <div class="dept-tabs" style="margin-top:8px">
        <button class="tab" id="fohTab" type="button">外場營運</button>
        <button class="tab" id="bohTab" type="button">內場廚務</button>
      </div>
    </section>

    <div class="section-title"><h2>紀錄日期</h2><span>可查看最近 7 天</span></div>
    <section class="panel">
      <div class="history-tools">
        <div class="field" style="margin-top:0">
          <label for="dateSelect">選擇日期</label>
          <input class="date-input" id="dateSelect" type="date">
        </div>
        <button class="today-btn" id="todayBtn" type="button">回到今天</button>
      </div>
      <div class="recent-days" id="recentDays"></div>
      <div class="readonly-banner" id="readonlyBanner">歷史紀錄為唯讀模式，僅能查看照片、備註與簽名。</div>
      <div class="storage-status" id="storageStatus">正在檢查照片儲存空間…</div>
    </section>

    <div class="section-title"><h2>目前操作人員</h2><span>照片會自動記錄</span></div>
    <section class="panel">
      <div class="operator-card">
        <div class="field" style="margin-top:0">
          <label for="operatorName">姓名</label>
          <input class="input" id="operatorName" type="text" placeholder="先輸入目前操作人員姓名">
          <div class="operator-hint">拍照上傳時會一併記錄上傳人與完整時間。</div>
        </div>
      </div>
    </section>

    <div class="section-title"><h2 id="listTitle">開店・外場營運</h2><span id="countText">0/0</span></div>
    <section class="panel">
      <div class="progress-head"><span>完成進度</span><span id="percentText">0%</span></div>
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="status-box" id="statusBox">請依序完成檢查項目。</div><div class="review-box" id="reviewBox"></div>
    </section>

    <section class="panel">
      <div class="checklist" id="checklist"></div>
    </section>

    <div class="section-title"><h2>交班紀錄</h2><span>有異常才填寫</span></div>
    <section class="panel">
      <div class="field">
        <label for="attendanceNote">出勤／遲到紀錄</label>
        <textarea id="attendanceNote" placeholder="例如：王小明遲到 10 分鐘，已於群組回報。"></textarea>
      </div>
      <div class="field">
        <label for="note">備註</label>
        <textarea id="note" placeholder="設備異常、缺料、未完成原因或需交接事項。"></textarea>
      </div>
    </section>

    <div class="section-title"><h2>確認人員</h2><span>完成後簽名</span></div>
    <section class="panel">
      <div class="signature-grid">
        <div class="signature-card">
          <label id="executorLabel">開店人員</label>
          <input id="executor" type="text" placeholder="輸入姓名">
        </div>
        <div class="signature-card">
          <label>值班主管</label>
          <input id="supervisor" type="text" placeholder="輸入姓名">
        </div>
      </div>
    </section>
    <div class="section-title"><h2>操作紀錄</h2><span>自動留存</span></div>
    <section class="panel"><div class="audit-list" id="auditList"></div></section>
    <section class="panel" id="returnPanel" style="display:none"><button class="return-btn" type="button" onclick="openReturnModal()">主管退回重做</button></section>
  </main>
</div>

<div class="save-bar">
  <button class="btn secondary" type="button" onclick="saveDraft()">儲存進度</button>
  <button class="btn primary" id="completeBtn" type="button" onclick="completeChecklist()">確認完成</button>
</div>
<div class="viewer" id="imageViewer" aria-hidden="true">
  <button class="viewer-close" type="button" onclick="closeImageViewer()" aria-label="關閉">×</button>
  <div class="viewer-content">
    <img class="viewer-image" id="viewerImage" alt="照片放大檢視">
    <div class="viewer-meta" id="viewerMeta"></div>
  </div>
</div>
<div class="modal" id="returnModal" aria-hidden="true"><div class="modal-card">
<h2 class="modal-title">主管退回重做</h2>
<div class="field"><label for="returnBy">退回主管</label><input class="input" id="returnBy" type="text" placeholder="輸入主管姓名"></div>
<div class="field"><label for="returnReason">退回原因</label><textarea id="returnReason" placeholder="請說明需要重做或補件的原因"></textarea></div>
<div class="modal-actions"><button class="btn secondary" type="button" onclick="closeReturnModal()">取消</button><button class="btn primary" type="button" onclick="confirmReturn()">確認退回</button></div>
</div></div><div class="toast" id="toast"></div>

<script>
const DASHBOARD_KEY='store-manager-os-v1';
const CHECKLIST_KEY='store-manager-os-checklist-v1';
const PHOTO_DB_NAME='store-manager-os-photos';
const PHOTO_DB_VERSION=1;
const PHOTO_STORE='photos';
const params=new URLSearchParams(location.search);
let storeKey=params.get('store')||'nansi';
let type=params.get('type')==='close'?'close':'open';
let dept=params.get('dept')==='boh'?'boh':'foh';
const formatDateKey=d=>[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
const todayKey=()=>formatDateKey(new Date());
let selectedDateKey=/^\d{4}-\d{2}-\d{2}$/.test(params.get('date')||'')?params.get('date'):todayKey();
const isToday=()=>selectedDateKey===todayKey();

const stores={
  nansi:{name:'南西店'},
  beiche:{name:'北車店'}
};
if(!stores[storeKey])storeKey='nansi';

const templates={
  open:{
    foh:[
      ['上傳零用金照片','拍攝當日零用金，照片上傳後自動完成','photo'],
      ['上傳早會內容照片','拍攝今日早會內容，照片上傳後自動完成','photo'],
      ['上傳今日小菜照片','拍攝當日實際販售的小菜，照片上傳後自動完成','photo'],
      ['確認 POS／刷卡機／發票正常','確認紙捲、刷卡機及發票設備可正常使用'],
      ['確認桌椅與用餐區清潔','桌面、座椅、地面及兒童椅不得有明顯髒污'],
      ['補齊餐具、紙巾與外帶用品','依今日預估營業量補充至定位'],
      ['查看今日公告／訂位／缺貨資訊','確認活動、訂位、缺品與特殊注意事項']
    ],
    boh:[
      ['開啟廚房必要電力設備','依設備安全順序開啟並確認運作正常'],
      ['確認冷藏冷凍設備溫度','發現異常立即回報並記錄'],
      ['檢查工作區與器具清潔','砧板、刀具、鍋具與工作台保持清潔'],
      ['確認今日備料與缺料','依營業需求盤點並回報不足品項'],
      ['確認食材標示與保存狀態','檢查日期、外觀、氣味與保存方式'],
      ['準備出餐區與包裝用品','容器、餐具、標籤與外帶用品就位'],
      ['確認消防、排煙與動線安全','不得堆放雜物或阻擋設備']
    ]
  },
  close:{
    foh:[
      ['完成最後結帳與帳務核對','核對現金、刷卡、發票及相關紀錄'],
      ['清潔桌椅、地面與服務區','完成擦拭、掃拖及垃圾分類'],
      ['清潔飲料吧與外場設備','器具清洗、原料封存並關閉設備'],
      ['補充隔日所需備品','餐具、紙巾及外帶用品補至定位'],
      ['確認門窗、招牌與照明','依關店順序關閉並確認安全'],
      ['處理垃圾與回收','依規定集中、分類並移至指定位置'],
      ['確認外場無遺留物品','包含客人物品、現金、文件及私人物品']
    ],
    boh:[
      ['完成食材收存與標示','密封、標日期並依規定冷藏或冷凍'],
      ['清潔爐台、工作台與器具','不得殘留油污、食物或積水'],
      ['清潔地面、排水與垃圾區','完成刷洗、消毒及垃圾分類'],
      ['確認冷藏冷凍設備正常','門體關妥、溫度正常且無異常警示'],
      ['關閉非必要電力設備','依安全順序關閉並保留必要設備'],
      ['確認瓦斯、消防與排煙安全','若店內無瓦斯，仍需確認消防及排煙'],
      ['完成隔日備料交接','記錄缺料、待處理事項與責任人']
    ]
  }
};


function openPhotoDB(){
  return new Promise((resolve,reject)=>{
    const request=indexedDB.open(PHOTO_DB_NAME,PHOTO_DB_VERSION);
    request.onupgradeneeded=()=>{
      const db=request.result;
      if(!db.objectStoreNames.contains(PHOTO_STORE))db.createObjectStore(PHOTO_STORE);
    };
    request.onsuccess=()=>resolve(request.result);
    request.onerror=()=>reject(request.error);
  });
}
async function putPhotoBlob(photoKey,blob){
  const db=await openPhotoDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(PHOTO_STORE,'readwrite');
    tx.objectStore(PHOTO_STORE).put(blob,photoKey);
    tx.oncomplete=()=>{db.close();resolve();};
    tx.onerror=()=>{db.close();reject(tx.error);};
  });
}
async function getPhotoBlob(photoKey){
  const db=await openPhotoDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(PHOTO_STORE,'readonly');
    const request=tx.objectStore(PHOTO_STORE).get(photoKey);
    request.onsuccess=()=>{db.close();resolve(request.result||null);};
    request.onerror=()=>{db.close();reject(request.error);};
  });
}
async function deletePhotoBlob(photoKey){
  const db=await openPhotoDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(PHOTO_STORE,'readwrite');
    tx.objectStore(PHOTO_STORE).delete(photoKey);
    tx.oncomplete=()=>{db.close();resolve();};
    tx.onerror=()=>{db.close();reject(tx.error);};
  });
}
function makePhotoKey(index){
  return [storeKey,selectedDateKey,type,dept,index].join('|');
}
async function dataUrlToBlob(dataUrl){
  const response=await fetch(dataUrl);
  return await response.blob();
}
async function getPhotoObjectUrl(photo){
  if(photo?.blobKey){
    const blob=await getPhotoBlob(photo.blobKey);
    return blob?URL.createObjectURL(blob):'';
  }
  return photo?.dataUrl||'';
}
async function updateStorageStatus(){
  const el=document.getElementById('storageStatus');
  if(!navigator.storage?.estimate){
    el.textContent='此瀏覽器無法顯示儲存空間用量。照片已改用裝置資料庫儲存。';
    el.className='storage-status';
    return;
  }
  try{
    const {usage=0,quota=0}=await navigator.storage.estimate();
    const mb=n=>Math.round(n/1024/1024*10)/10;
    const percent=quota?Math.round(usage/quota*100):0;
    el.textContent=`照片儲存：已使用 ${mb(usage)} MB／可用 ${mb(quota)} MB（${percent}%）`;
    el.className='storage-status'+(percent>=85?' danger':percent>=65?' warn':'');
  }catch{
    el.textContent='照片已改用裝置資料庫儲存。';
    el.className='storage-status';
  }
}

function readChecklistRoot(){
  try{return JSON.parse(localStorage.getItem(CHECKLIST_KEY))||{}}catch{return {}}
}
function writeChecklistRoot(root){localStorage.setItem(CHECKLIST_KEY,JSON.stringify(root))}
function currentPath(){return [storeKey,selectedDateKey,type,dept]}
function getRecord(){
  const root=readChecklistRoot();
  return root?.stores?.[storeKey]?.days?.[selectedDateKey]?.[type]?.[dept]||{
    checked:{},photos:{},operatorName:'',attendanceNote:'',note:'',executor:'',supervisor:'',completed:false,reviewStatus:'draft',returnReason:'',returnedBy:'',returnedAt:null,audit:[],updatedAt:null
  };
}
function saveRecord(record){
  const root=readChecklistRoot();
  root.version=1;root.updatedAt=new Date().toISOString();root.stores??={};root.stores[storeKey]??={days:{}};root.stores[storeKey].days??={};
  root.stores[storeKey].days[selectedDateKey]??={};root.stores[storeKey].days[selectedDateKey][type]??={};
  root.stores[storeKey].days[selectedDateKey][type][dept]={...record,updatedAt:new Date().toISOString()};
  writeChecklistRoot(root);
}
function addAudit(action,detail='',actor=''){
  record.audit??=[];
  record.audit.unshift({action,detail,actor:actor||record.operatorName||record.executor||'未記錄',at:new Date().toISOString(),timeText:new Intl.DateTimeFormat('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(new Date())});
  record.audit=record.audit.slice(0,50);
}
function isLocked(){return !isToday()||Boolean(record.completed);}
function syncDashboard(){
  if(!isToday())return;
  let root={};
  try{root=JSON.parse(localStorage.getItem(DASHBOARD_KEY))||{}}catch{}
  root.schemaVersion=6;root.updatedAt=new Date().toISOString();root.stores??={};root.stores[storeKey]??={days:{}};root.stores[storeKey].days??={};
  const date=todayKey();
  const daily=root.stores[storeKey].days[date]||{
    schemaVersion:6,date,checklist:{openDone:false,closeDone:false},events:{openCount:0},orders:{unsubmitted:0,orderedWaiting:0,arrivedUnreceived:0},bonus:{created:false},staff:{scheduled:0,present:0,foh:0,boh:0},announcement:'公告將由後台發布。',revision:0,updatedAt:null
  };
  const detail=readChecklistRoot()?.stores?.[storeKey]?.days?.[date]||{};
  const isTypeDone=t=>Boolean(detail?.[t]?.foh?.completed&&detail?.[t]?.boh?.completed);
  daily.checklist={...daily.checklist,openDone:isTypeDone('open'),closeDone:isTypeDone('close')};
  daily.revision=(Number(daily.revision)||0)+1;
  daily.updatedAt=new Date().toISOString();
  root.stores[storeKey].days[date]=daily;
  localStorage.setItem(DASHBOARD_KEY,JSON.stringify(root));
  try{new BroadcastChannel('store-manager-os-sync').postMessage({type:'state-updated',storeKey,dateKey:date,revision:daily.revision})}catch{}
}

let record=getRecord();

  document.getElementById('closeTab').classList.toggle('active',type==='close');

  document.getElementById('bohTab').classList.toggle('active',dept==='boh');

    const photoRequired=item[2]==='photo';

    if(photoRequired){

        <div class="photo-head">
          <span class="photo-index">${checked?'✓':index+1}</span>
          <span class="photo-body">
            <span class="item-title">${item[0]}<span class="photo-required">必填</span></span>
            <span class="item-sub">${item[1]}</span>
          </span>
        </div>
        ${photo&&(photo.dataUrl||photo.blobKey)?`<img class="photo-preview" src="" alt="${item[0]}預覽" data-view-photo="${index}">
          <div class="photo-meta">已上傳 · ${photo.uploader||'未記錄人員'} · ${photo.timeText||''}</div>`:''}
        <div class="photo-actions">
          <label class="photo-upload">📷 ${photo&&(photo.dataUrl||photo.blobKey)?'重新拍照':'拍照上傳'}
            <input type="file" accept="image/*" capture="environment" data-photo-index="${index}">
          </label>
          ${photo&&(photo.dataUrl||photo.blobKey)?`<button class="photo-remove" type="button" data-remove-photo="${index}">刪除</button>`:''}
        </div>
      </div>`;
    }
    return `<label class="check-row ${checked?'checked':''}">
      <input type="checkbox" data-index="${index}" ${checked?'checked':''}>

      <span><span class="item-title">${item[0]}</span><span class="item-sub">${item[1]}</span></span>
    </label>`;
  }).join('');
  await Promise.all([...list.querySelectorAll('[data-view-photo]')].map(async image=>{
    const index=image.dataset.viewPhoto;

    }catch(error){console.error(error);image.alt='照片讀取失敗';}
  }));
  list.querySelectorAll('input[type=checkbox]').forEach(input=>{input.disabled=isLocked();input.onchange=()=>{
    if(isLocked())return;record.checked[input.dataset.index]=input.checked;record.completed=false;markChanged();render();
  }});
  list.querySelectorAll('input[data-photo-index]').forEach(input=>input.onchange=async()=>{
    if(isLocked())return;
    const file=input.files?.[0];if(!file)return;
    captureFields();
    if(!record.operatorName){input.value='';return toast('請先輸入目前操作人員姓名');}
    try{
      const dataUrl=await compressImage(file);
      const index=input.dataset.photoIndex;
      const now=new Date();
      const blobKey=makePhotoKey(index);
      const blob=await dataUrlToBlob(dataUrl);
      await putPhotoBlob(blobKey,blob);
      record.photos[index]={
        blobKey,
        name:file.name,
        uploader:record.operatorName,
        uploadedAt:now.toISOString(),
        timeText:new Intl.DateTimeFormat('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(now)
      };
      record.checked[index]=true;record.completed=false;record.reviewStatus='draft';addAudit('上傳照片',items[index][0],record.operatorName);
      saveRecord(record);syncDashboard();document.getElementById('saveState').textContent='照片已儲存';toast('照片已上傳');render();
    }catch(error){console.error(error);toast(error?.name==='QuotaExceededError'?'儲存空間不足，請先清理舊照片':'照片處理失敗，請重新拍攝');updateStorageStatus();}
  });
  list.querySelectorAll('[data-remove-photo]').forEach(button=>button.onclick=async()=>{
    if(isLocked())return;
    const index=button.dataset.removePhoto;
    const photo=record.photos?.[index];if(photo?.blobKey)await deletePhotoBlob(photo.blobKey);
    delete record.photos[index];record.checked[index]=false;record.completed=false;record.reviewStatus='draft';addAudit('刪除照片',items[index][0]);
    saveRecord(record);syncDashboard();document.getElementById('saveState').textContent='照片已刪除';toast('照片已刪除');render();
  });

  document.getElementById('note').value=record.note||'';
  document.getElementById('executor').value=record.executor||'';
  document.getElementById('supervisor').value=record.supervisor||'';

  const done=items.filter((item,i)=>item[2]==='photo'?Boolean(record.photos?.[i]?.dataUrl||record.photos?.[i]?.blobKey):Boolean(record.checked?.[i])).length;

  document.getElementById('returnPanel').style.display=isToday()&&record.completed?'block':'none';renderAudit();

async function compressImage(file){
  if(!file.type.startsWith('image/'))throw new Error('NOT_IMAGE');
  const source=await new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);reader.onerror=reject;reader.readAsDataURL(file);
  });
  const image=await new Promise((resolve,reject)=>{
    const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=source;
  });
  const maxSide=1280;
  const scale=Math.min(1,maxSide/Math.max(image.width,image.height));
  const canvas=document.createElement('canvas');
  canvas.width=Math.max(1,Math.round(image.width*scale));
  canvas.height=Math.max(1,Math.round(image.height*scale));
  const context=canvas.getContext('2d');
  context.drawImage(image,0,0,canvas.width,canvas.height);
  return canvas.toDataURL('image/jpeg',.72);
}
function captureFields(){
  record.operatorName=document.getElementById('operatorName').value.trim();
  record.attendanceNote=document.getElementById('attendanceNote').value.trim();
  record.note=document.getElementById('note').value.trim();
  record.executor=document.getElementById('executor').value.trim();
  record.supervisor=document.getElementById('supervisor').value.trim();
}
function markChanged(){

}
function saveDraft(){
  if(!isToday())return toast('歷史紀錄不可修改');
  captureFields();record.completed=false;record.reviewStatus='draft';addAudit('儲存進度',`${type==='open'?'開店':'關店'}・${dept==='foh'?'外場':'內場'}`);saveRecord(record);syncDashboard();document.getElementById('saveState').textContent='進度已儲存';toast('Checklist 進度已儲存');render();
}
function completeChecklist(){
  if(!isToday())return toast('歷史紀錄不可修改');
  captureFields();
  const items=templates[type][dept];
  const done=items.filter((item,i)=>item[2]==='photo'?Boolean(record.photos?.[i]?.dataUrl||record.photos?.[i]?.blobKey):Boolean(record.checked?.[i])).length;
  if(done!==items.length)return toast(type==='open'&&dept==='foh'?'請先上傳三張照片並完成其他項目':'請先完成所有檢查項目');
  if(!record.executor)return toast(`請填寫${type==='open'?'開店':'關店'}人員`);
  if(!record.supervisor)return toast('請填寫值班主管');
  record.completed=true;record.reviewStatus='completed';record.completedAt=new Date().toISOString();addAudit('確認完成',`${type==='open'?'開店':'關店'}・${dept==='foh'?'外場':'內場'}`,record.supervisor);saveRecord(record);syncDashboard();
  document.getElementById('saveState').textContent='已完成並同步';toast('Checklist 已完成');render();
}
async function resetCurrent(){
  if(!isToday())return toast('歷史紀錄不可重設');
  if(!confirm(`確定要重設目前的${type==='open'?'開店':'關店'}・${dept==='foh'?'外場':'內場'} Checklist？`))return;
  for(const photo of Object.values(record.photos||{})){if(photo?.blobKey)await deletePhotoBlob(photo.blobKey);}
  record={checked:{},photos:{},operatorName:'',attendanceNote:'',note:'',executor:'',supervisor:'',completed:false,reviewStatus:'draft',returnReason:'',returnedBy:'',returnedAt:null,audit:[],updatedAt:null};
  saveRecord(record);syncDashboard();toast('本區 Checklist 已重設');render();
}
function switchView(nextType,nextDept){
  if(isToday()&&!record.completed){captureFields();saveRecord(record);}type=nextType;dept=nextDept;
  const url=new URL(location.href);url.searchParams.set('store',storeKey);url.searchParams.set('type',type);url.searchParams.set('dept',dept);url.searchParams.set('date',selectedDateKey);history.replaceState({},'',url);
  record=getRecord();render();
}
document.getElementById('openTab').onclick=()=>switchView('open',dept);
document.getElementById('closeTab').onclick=()=>switchView('close',dept);
document.getElementById('fohTab').onclick=()=>switchView(type,'foh');
document.getElementById('bohTab').onclick=()=>switchView(type,'boh');
['operatorName','attendanceNote','note','executor','supervisor'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{if(isToday()&&!record.completed)markChanged()}));

const storeSelect=document.getElementById('storeSelect');
storeSelect.innerHTML=Object.entries(stores).map(([key,s])=>`<option value="${key}" ${key===storeKey?'selected':''}>${s.name}</option>`).join('');
storeSelect.onchange=()=>{const url=new URL(location.href);url.searchParams.set('store',storeSelect.value);url.searchParams.set('date',selectedDateKey);location.href=url.toString()};

function getDaySummary(dateKey){
  const day=readChecklistRoot()?.stores?.[storeKey]?.days?.[dateKey]||{};
  const openDone=Boolean(day?.open?.foh?.completed&&day?.open?.boh?.completed);
  const closeDone=Boolean(day?.close?.foh?.completed&&day?.close?.boh?.completed);
  if(openDone&&closeDone)return '開關完成';
  if(openDone)return '開店完成';
  if(closeDone)return '關店完成';
  return '未完成';
}
function renderRecentDays(){
  const wrap=document.getElementById('recentDays');
  const today=new Date();
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const key=formatDateKey(d);
    days.push({key,day:d.getDate(),week:new Intl.DateTimeFormat('zh-TW',{weekday:'short'}).format(d),status:getDaySummary(key)});
  }
  wrap.innerHTML=days.map(day=>`<button class="day-chip ${day.key===selectedDateKey?'active':''}" type="button" data-date="${day.key}">
    <span>${day.week}</span><strong>${day.day}</strong><span class="day-status">${day.status}</span>
  </button>`).join('');
  wrap.querySelectorAll('[data-date]').forEach(button=>button.onclick=()=>changeDate(button.dataset.date));
}
function changeDate(nextDate){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(nextDate))return;
  if(isToday()){captureFields();saveRecord(record);}
  selectedDateKey=nextDate;
  const url=new URL(location.href);url.searchParams.set('date',selectedDateKey);history.replaceState({},'',url);
  record=getRecord();render();
}
document.getElementById('dateSelect').addEventListener('change',event=>changeDate(event.target.value));
document.getElementById('todayBtn').addEventListener('click',()=>changeDate(todayKey()));

function renderAudit(){
  const list=document.getElementById('auditList'),audit=Array.isArray(record.audit)?record.audit:[];
  list.innerHTML=audit.length?audit.map(x=>`<div class="audit-row"><div class="audit-title">${x.action}${x.detail?`｜${x.detail}`:''}</div><div class="audit-meta">${x.actor||'未記錄'} · ${x.timeText||''}</div></div>`).join(''):'<div class="audit-empty">尚無操作紀錄</div>';

function openReturnModal(){
  if(!isToday()||!record.completed)return;
  document.getElementById('returnBy').value=record.supervisor||'';
  document.getElementById('returnReason').value='';
  document.getElementById('returnModal').classList.add('show');
}
function closeReturnModal(){document.getElementById('returnModal').classList.remove('show');}
function confirmReturn(){
  const by=document.getElementById('returnBy').value.trim(),reason=document.getElementById('returnReason').value.trim();
  if(!by)return toast('請填寫退回主管');if(!reason)return toast('請填寫退回原因');

document.getElementById('returnModal').addEventListener('click',e=>{if(e.target.id==='returnModal')closeReturnModal();});

async function openImageViewer(photo,title){
  const url=await getPhotoObjectUrl(photo);
  document.getElementById('viewerImage').src=url;
  document.getElementById('viewerMeta').textContent=`${title}｜上傳人：${photo.uploader||'未記錄'}｜${photo.timeText||''}`;
  const viewer=document.getElementById('imageViewer');
  viewer.classList.add('show');viewer.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
}
function closeImageViewer(){
  const viewer=document.getElementById('imageViewer');
  viewer.classList.remove('show');viewer.setAttribute('aria-hidden','true');
  const image=document.getElementById('viewerImage');
  if(image.src.startsWith('blob:'))URL.revokeObjectURL(image.src);
  image.src='';
  document.body.style.overflow='';
}
document.getElementById('imageViewer').addEventListener('click',event=>{
  if(event.target.id==='imageViewer')closeImageViewer();
});
document.addEventListener('keydown',event=>{if(event.key==='Escape')closeImageViewer()});


async function migrateLegacyPhotos(){
  const root=readChecklistRoot();
  let changed=false;
  for(const [sKey,sData] of Object.entries(root?.stores||{})){
    for(const [dateKey,day] of Object.entries(sData?.days||{})){
      for(const typeKey of ['open','close']){
        for(const deptKey of ['foh','boh']){
          const rec=day?.[typeKey]?.[deptKey];
          if(!rec?.photos)continue;
          for(const [index,photo] of Object.entries(rec.photos)){
            if(photo?.dataUrl&&!photo?.blobKey){
              try{
                const blobKey=[sKey,dateKey,typeKey,deptKey,index].join('|');
                const blob=await dataUrlToBlob(photo.dataUrl);
                await putPhotoBlob(blobKey,blob);
                rec.photos[index]={...photo,blobKey};
                delete rec.photos[index].dataUrl;
                changed=true;
              }catch(error){console.error('Legacy photo migration failed',error);}
            }
          }
        }
      }
    }
  }
  if(changed)writeChecklistRoot(root);
}

let toastTimer;
function toast(message){const el=document.getElementById('toast');el.textContent=message;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1800)}
(async()=>{
  await migrateLegacyPhotos();
  record=getRecord();
  await render();
  await updateStorageStatus();
})();
