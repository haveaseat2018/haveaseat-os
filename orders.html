  <style>
    :root{--bg:#f4f7fb;--surface:#fff;--text:#172033;--muted:#6b7280;--line:#e5eaf2;--primary:#155eef;--primary-soft:#eaf1ff;--green:#168a52;--green-soft:#eaf8f0;--yellow:#b7791f;--yellow-soft:#fff7e6;--red:#d64545;--red-soft:#fff0f0;--shadow:0 12px 30px rgba(28,51,84,.10)}

    .top{display:flex;justify-content:space-between;align-items:center;gap:12px}.back{display:inline-flex;align-items:center;gap:7px;color:#fff;font-size:13px;background:rgba(255,255,255,.14);padding:9px 11px;border-radius:12px}.icon{width:40px;height:40px;border:0;border-radius:13px;background:rgba(255,255,255,.16);color:#fff}.store-row{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-top:12px}.store-name{margin:0;font-size:22px}.meta{margin-top:7px;font-size:12px;opacity:.88}.store-select{appearance:none;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.15);color:#fff;border-radius:12px;padding:8px 30px 8px 10px;font-size:12px;font-weight:800}.store-select option{color:#172033;background:#fff}

    .list-tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.list-tools .input{margin:0}.health-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:13px;background:#fafbfd;border:1px solid var(--line);font-size:12px}.health-row strong{font-size:14px}.health-row.bad{background:var(--red-soft);border-color:#ffd5d5;color:var(--red)}.receipt-list{display:grid;gap:10px}.receipt-card{padding:13px;border:1px solid var(--line);border-radius:16px;background:#fafbfd}.receipt-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.receipt-title{font-size:15px;font-weight:900}.receipt-meta{margin-top:5px;font-size:11px;color:var(--muted);line-height:1.55}.amount{font-size:18px;font-weight:900;color:var(--primary);white-space:nowrap}.thumb{display:block;width:100%;max-height:240px;object-fit:cover;border-radius:13px;margin-top:10px;border:1px solid var(--line);background:#eef2f7;cursor:zoom-in}.receipt-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.small-btn{border:0;border-radius:11px;min-height:38px;font-size:11px;font-weight:850}.small-btn.secondary{background:#eef2f7;color:#445066}.small-btn.danger{background:var(--red-soft);color:var(--red)}.empty{padding:24px 12px;text-align:center;color:var(--muted);font-size:13px}

<body>
<div class="app">
  <header class="hero">
    <div class="top">
      <a class="back" id="backLink" href="dashboard.html">← Dashboard</a>
      <button class="icon" type="button" onclick="openReceiptModal()">＋</button>
    </div>
    <div class="store-row">
      <div>
        <h1 class="store-name" id="pageTitle">到貨單據</h1>
        <div class="meta"><span id="today"></span> · 拍照、金額、類別 · v1.0</div>
      </div>

  </header>

  <main>
    <div class="section-title"><h2>週統計</h2><span id="weekLabel">本週</span></div>
    <section class="panel">
      <div class="week-tabs">
        <button class="tab active" id="thisWeekTab" type="button">本週</button>
        <button class="tab" id="lastWeekTab" type="button">上週</button>
        <button class="tab" id="monthTab" type="button">月份</button>
        <button class="tab" id="allTab" type="button">全部</button>
      </div>
      <div class="filter-tools" id="monthTools" style="display:none">
        <input class="month-input" id="monthSelect" type="month">
        <button class="tool-btn primary" type="button" onclick="applyMonthFilter()">查看</button>
      </div>
      <div class="summary-grid" style="margin-top:12px">
        <div class="summary-card ok"><small>單據張數</small><strong id="receiptCount">0</strong></div>
        <div class="summary-card"><small>採購總額</small><strong id="weekTotal">$0</strong></div>
      </div>
      <div class="category-list" id="categorySummary" style="margin-top:12px"></div>
      <div id="comparisonBlock" style="margin-top:12px">
        <div class="receipt-meta" id="comparisonLabel" style="margin-bottom:7px">與前期比較</div>
        <div class="compare-grid">
          <div class="compare-card"><small>採購總額</small><strong class="delta" id="totalDelta">—</strong></div>
          <div class="compare-card"><small>食材採購額</small><strong class="delta" id="foodDelta">—</strong></div>
          <div class="compare-card"><small>單據張數</small><strong class="delta" id="countDelta">—</strong></div>
        </div>
      </div>
    </section>

    <div id="analysisSection">
      <div class="section-title"><h2>採購分析</h2><span>店經理填營業額</span></div>
      <section class="panel">
        <div class="field" style="margin-top:0">
          <label for="revenueInput">目前區間營業額</label>
          <input class="input" id="revenueInput" inputmode="numeric" placeholder="例如：250000">
        </div>
        <div class="analysis-grid" style="margin-top:12px">
          <div class="summary-card"><small>食材採購額</small><strong id="foodPurchaseTotal">$0</strong></div>
          <div class="summary-card"><small>全部採購額</small><strong id="allPurchaseTotal">$0</strong></div>
          <div class="summary-card"><small>估算食材採購率</small><strong class="ratio" id="foodPurchaseRate">—</strong></div>
          <div class="summary-card"><small>估算全部採購率</small><strong class="ratio" id="allPurchaseRate">—</strong></div>
        </div>
        <div class="analysis-note">食材採購額包含生鮮、海鮮、中央廚房、甜品、飲品原料與一般食材；不包含包材、清潔用品、設備／租賃及其他。此數字是採購率估算，不是正式食材成本率。</div>
      </section>
    </div>

    <div class="section-title"><h2>到貨單據</h2><span id="listCount">0 張</span></div>
    <section class="panel">
      <div class="list-tools">
        <select class="input" id="listCategoryFilter"></select>
        <input class="input" id="searchInput" type="search" placeholder="搜尋上傳人或備註">
      </div>
      <div class="receipt-list" id="receiptList"></div>
    </section>

    <div class="section-title"><h2>資料工具</h2><span>包含單據照片</span></div>
    <section class="panel">
      <div class="tool-row">
        <button class="tool-btn primary" type="button" onclick="copyPeriodSummary()">複製期間摘要</button>
        <button class="tool-btn" type="button" onclick="exportCurrentCsv()">匯出目前清單 CSV</button>
        <button class="tool-btn" type="button" onclick="checkDataHealth()">檢查資料完整性</button>
        <button class="tool-btn primary" type="button" onclick="exportBackup()">匯出完整備份</button>
        <button class="tool-btn" type="button" onclick="document.getElementById('importFile').click()">匯入備份</button>
      </div>
      <div id="healthResult" style="margin-top:10px"></div>
      <input id="importFile" type="file" accept="application/json,.json" hidden>
    </section>
  </main>
</div>

<button class="fab" type="button" onclick="openReceiptModal()">＋</button>

<div class="modal" id="receiptModal">
  <div class="modal-card">
    <h2 class="modal-title" id="modalTitle">新增到貨單據</h2>
    <div class="field">
      <label>單據照片</label>
      <label class="photo-upload">📷 拍照／上傳
        <input id="photoInput" type="file" accept="image/*" capture="environment">
      </label>
      <img class="photo-preview" id="photoPreview" alt="單據預覽">
    </div>
    <div class="field">
      <label for="receiptDate">單據日期</label>
      <input class="input" id="receiptDate" type="date">
    </div>
    <div class="field">
      <label for="amount">單據金額</label>
      <input class="input" id="amount" inputmode="numeric" placeholder="例如：2200">
    </div>
    <div class="field">
      <label>類別</label>
      <div class="category-grid" id="categoryGrid"></div>
      <div class="category-help" id="categoryHelp"></div>
    </div>
    <div class="field">
      <label for="uploader">上傳人</label>
      <input class="input" id="uploader" placeholder="姓名">
    </div>
    <div class="field">
      <label for="note">備註（選填）</label>
      <textarea id="note" placeholder="例如：單據金額看不清楚、補登原因"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn secondary" type="button" onclick="closeReceiptModal()">取消</button>
      <button class="btn primary" type="button" onclick="saveReceipt()">儲存單據</button>
    </div>

</div>

<div class="viewer" id="viewer">
  <button class="viewer-close" type="button" onclick="closeViewer()">×</button>
  <img id="viewerImage" alt="單據放大">
</div>

<nav>
  <button class="nav" onclick="location.href='index.html'"><b>⌂</b>首頁</button>
  <button class="nav" onclick="location.href='dashboard.html'"><b>▦</b>Dashboard</button>
  <button class="nav" onclick="location.href='checklist.html'"><b>✓</b>Checklist</button>
  <button class="nav" onclick="location.href='events.html'"><b>!</b>事件</button>
  <button class="nav active"><b>🧾</b>單據</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const RECEIPTS_KEY='store-manager-os-receipts-v1';
const PHOTO_DB='store-manager-os-receipts-photos';
const PHOTO_STORE='photos';
const REVENUE_KEY='store-manager-os-receipts-revenue-v1';
const params=new URLSearchParams(location.search);
let storeKey=params.get('store')||'nansi';
const stores={nansi:{name:'南西店'},beiche:{name:'北車店'}};
if(!stores[storeKey])storeKey='nansi';
const categories=['生鮮食材','海鮮','中央廚房','甜品原料','飲品原料','一般食材','包材耗材','清潔用品','設備／租賃','其他'];
const foodCategories=new Set(['生鮮食材','海鮮','中央廚房','甜品原料','飲品原料','一般食材']);
let selectedCategory='生鮮食材';
const categoryDescriptions={
  '生鮮食材':'蔬菜、水果、肉品、雞蛋等生鮮原料',
  '海鮮':'魚、蝦、貝類及其他水產',
  '中央廚房':'中央廚房配送的半成品、成品或調理品',
  '甜品原料':'豆花、仙草凍、珍珠、杏仁豆腐、紅豆紫米粥等',
  '飲品原料':'牛奶、氣泡水、咖啡豆、茶葉、果醬、果露、糖漿等',
  '一般食材':'乾貨、調味料、冷凍食材及其他食品',
  '包材耗材':'餐盒、紙杯、吸管、垃圾袋、手套等',
  '清潔用品':'洗碗精、清潔劑、菜瓜布、抹布等',
  '設備／租賃':'設備購買、維修、租金及相關費用',
  '其他':'無法歸入以上類別的單據'
};
const legacyCategoryMap={
  '菜':'生鮮食材',
  '肉':'生鮮食材',
  '魚':'海鮮',
  '茶':'飲品原料',
  '包材':'包材耗材'
};

const formatDate=d=>[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
const todayKey=()=>formatDate(new Date());

let editingId=null;
let editingPhotoKey=null;
let pendingPhotoBlob=null;
let filterMode='thisWeek';
let selectedMonth=todayKey().slice(0,7);
let selectedListCategory='全部';
let searchText='';
let objectUrls=[];

function startOfWeek(offset=0){
  const d=new Date();
  const day=d.getDay()||7;
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()-day+1+(offset*7));
  return d;
}
function endOfWeek(offset=0){
  const d=startOfWeek(offset);
  d.setDate(d.getDate()+6);
  d.setHours(23,59,59,999);
  return d;
}
function readRoot(){
  try{
    const parsed=JSON.parse(localStorage.getItem(RECEIPTS_KEY));
    return parsed&&typeof parsed==='object'?parsed:{};
  }catch{return {}}
}
function writeRoot(root){
  root.version=10;
  root.updatedAt=new Date().toISOString();
  localStorage.setItem(RECEIPTS_KEY,JSON.stringify(root));
}
function getReceipts(){
  const receipts=readRoot()?.stores?.[storeKey]?.receipts||[];
  let changed=false;
  receipts.forEach(receipt=>{
    const mapped=legacyCategoryMap[receipt.category];
    if(mapped&&mapped!==receipt.category){
      receipt.category=mapped;
      changed=true;
    }
  });
  if(changed)saveReceipts(receipts);
  return receipts;
}
function saveReceipts(receipts){
  const root=readRoot();
  root.stores??={};
  root.stores[storeKey]??={};
  root.stores[storeKey].receipts=receipts;
  writeRoot(root);
}
function openDB(){
  return new Promise((resolve,reject)=>{
    const request=indexedDB.open(PHOTO_DB,1);
    request.onupgradeneeded=()=>{
      if(!request.result.objectStoreNames.contains(PHOTO_STORE))request.result.createObjectStore(PHOTO_STORE);
    };
    request.onsuccess=()=>resolve(request.result);
    request.onerror=()=>reject(request.error);
  });
}
async function putPhoto(key,blob){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(PHOTO_STORE,'readwrite');
    tx.objectStore(PHOTO_STORE).put(blob,key);
    tx.oncomplete=()=>{db.close();resolve()};
    tx.onerror=()=>{db.close();reject(tx.error)};
  });
}
async function getPhoto(key){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(PHOTO_STORE,'readonly');
    const request=tx.objectStore(PHOTO_STORE).get(key);
    request.onsuccess=()=>{db.close();resolve(request.result||null)};
    request.onerror=()=>{db.close();reject(request.error)};
  });
}
async function deletePhoto(key){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(PHOTO_STORE,'readwrite');
    tx.objectStore(PHOTO_STORE).delete(key);
    tx.oncomplete=()=>{db.close();resolve()};
    tx.onerror=()=>{db.close();reject(tx.error)};
  });
}

async function getAllPhotoEntries(){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(PHOTO_STORE,'readonly');
    const store=tx.objectStore(PHOTO_STORE);
    const keys=store.getAllKeys();
    const values=store.getAll();
    tx.oncomplete=()=>{
      const result=(keys.result||[]).map((key,index)=>({key:String(key),blob:values.result[index]}));
      db.close();resolve(result);
    };
    tx.onerror=()=>{db.close();reject(tx.error)};
  });
}

    tx.objectStore(PHOTO_STORE).clear();
    tx.oncomplete=()=>{db.close();resolve()};
    tx.onerror=()=>{db.close();reject(tx.error)};
  });
}
function blobToDataUrl(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(blob);
  });
}
async function dataUrlToBlob(dataUrl){
  return await (await fetch(dataUrl)).blob();
}

async function compressImage(file){
  if(!file.type.startsWith('image/'))throw new Error('NOT_IMAGE');
  const source=await new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
  const image=await new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=reject;
    img.src=source;
  });
  const maxSide=1280;
  const scale=Math.min(1,maxSide/Math.max(image.width,image.height));
  const canvas=document.createElement('canvas');
  canvas.width=Math.max(1,Math.round(image.width*scale));
  canvas.height=Math.max(1,Math.round(image.height*scale));
  canvas.getContext('2d').drawImage(image,0,0,canvas.width,canvas.height);
  const dataUrl=canvas.toDataURL('image/jpeg',.75);
  return await (await fetch(dataUrl)).blob();
}
function escapeHtml(value=''){
  return String(value).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function parseAmount(value){
  const n=Number(String(value||'').replace(/[^\d.-]/g,''));

}

function csvEscape(value){
  const text=String(value??'');
  return /[",\n]/.test(text)?`"${text.replace(/"/g,'""')}"`:text;
}

function previousPeriodReceipts(){
  const receipts=getReceipts();
  if(filterMode==='thisWeek'||filterMode==='lastWeek'){
    const currentOffset=filterMode==='lastWeek'?-1:0;
    const previousOffset=currentOffset-1;
    const start=startOfWeek(previousOffset).getTime();
    const end=endOfWeek(previousOffset).getTime();
    return receipts.filter(r=>{
      const time=new Date((r.receiptDate||r.createdAt.slice(0,10))+'T12:00:00').getTime();
      return time>=start&&time<=end;
    });
  }
  if(filterMode==='month'){
    const [year,month]=selectedMonth.split('-').map(Number);
    const previous=new Date(year,month-2,1);
    const previousKey=`${previous.getFullYear()}-${String(previous.getMonth()+1).padStart(2,'0')}`;
    return receipts.filter(r=>(r.receiptDate||r.createdAt.slice(0,10)).slice(0,7)===previousKey);
  }
  return [];
}
function deltaText(current,previous,isMoney=false){
  if(!previous&&current)return isMoney?`新增 ${money(current)}`:`新增 ${current}`;
  if(!previous&&!current)return '—';
  const diff=current-previous;
  const pct=previous?Math.abs(diff/previous*100):0;
  const sign=diff>0?'↑':diff<0?'↓':'—';
  const value=isMoney?money(Math.abs(diff)):Math.abs(diff).toLocaleString('zh-TW');
  return diff===0?'持平':`${sign} ${value}（${pct.toFixed(1)}%）`;
}
function setDelta(element,current,previous,isMoney=false){
  const diff=current-previous;
  element.textContent=deltaText(current,previous,isMoney);
  element.classList.remove('up','down','flat');
  element.classList.add(diff>0?'up':diff<0?'down':'flat');
}

  const currentTotal=currentReceipts.reduce((sum,r)=>sum+Number(r.amount||0),0);
  const previousTotal=previous.reduce((sum,r)=>sum+Number(r.amount||0),0);
  const currentFood=currentReceipts.reduce((sum,r)=>sum+(foodCategories.has(r.category)?Number(r.amount||0):0),0);
  const previousFood=previous.reduce((sum,r)=>sum+(foodCategories.has(r.category)?Number(r.amount||0):0),0);
  document.getElementById('comparisonLabel').textContent=filterMode==='month'?'與上個月比較':'與前一週比較';
  setDelta(document.getElementById('totalDelta'),currentTotal,previousTotal,true);

}

async function saveReceipt(){
  const receiptDate=document.getElementById('receiptDate').value;
  const amount=parseAmount(document.getElementById('amount').value);
  const uploader=document.getElementById('uploader').value.trim();
  if(!receiptDate)return toast('請選擇單據日期');
  if(!amount)return toast('請填寫單據金額');
  if(!uploader)return toast('請填寫上傳人');
  if(!editingId&&!pendingPhotoBlob)return toast('請先拍攝單據照片');

  const receipts=getReceipts();
  const duplicate=receipts.find(r=>r.id!==editingId&&(r.receiptDate||r.createdAt.slice(0,10))===receiptDate&&Number(r.amount)===amount&&r.category===selectedCategory);
  if(duplicate&&!confirm('已有相同日期、金額與類別的單據，可能重複上傳。仍要儲存嗎？'))return;
  const now=new Date();
  if(editingId){
    const index=receipts.findIndex(r=>r.id===editingId);
    if(index<0)return;
    const receipt=receipts[index];
    if(pendingPhotoBlob){
      await putPhoto(receipt.photoKey,pendingPhotoBlob);
    }
    receipts[index]={
      ...receipt,
      receiptDate,
      amount,
      category:selectedCategory,
      uploader,
      note:document.getElementById('note').value.trim(),
      updatedAt:now.toISOString()
    };
  }else{
    const id=crypto.randomUUID?crypto.randomUUID():String(Date.now());
    const photoKey=`${storeKey}|${id}`;
    await putPhoto(photoKey,pendingPhotoBlob);
    receipts.push({
      id,photoKey,receiptDate,amount,category:selectedCategory,uploader,
      note:document.getElementById('note').value.trim(),
      createdAt:now.toISOString(),
      updatedAt:now.toISOString(),
      timeText:new Intl.DateTimeFormat('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(now)
    });
  }
  localStorage.setItem('store-manager-last-uploader',uploader);
  saveReceipts(receipts);
  closeReceiptModal();
  toast(editingId?'單據已更新':'單據已儲存');
  await render();
}

    link.remove();
    URL.revokeObjectURL(url);
    toast('完整備份已匯出');
  }catch(error){
    console.error(error);
    toast('備份匯出失敗');
  }
}
async function importBackup(file){
  try{
    const payload=JSON.parse(await file.text());
    if(payload?.app!=='Store Receipts'||!payload?.data||!Array.isArray(payload?.photos)){
      throw new Error('INVALID_BACKUP');
    }
    if(!confirm('匯入會覆蓋目前所有單據與照片，確定繼續？'))return;
    localStorage.setItem(RECEIPTS_KEY,JSON.stringify(payload.data));
    localStorage.setItem(REVENUE_KEY,JSON.stringify(payload.revenue||{}));
    await clearPhotoStore();
    for(const photo of payload.photos){
      if(photo?.key&&photo?.dataUrl)await putPhoto(photo.key,await dataUrlToBlob(photo.dataUrl));
    }
    toast('備份已匯入');
    await render();
  }catch(error){
    console.error(error);
    toast('備份格式錯誤或匯入失敗');
  }finally{
    document.getElementById('importFile').value='';
  }
}
document.getElementById('revenueInput').addEventListener('change',saveCurrentRevenue);
document.getElementById('revenueInput').addEventListener('blur',saveCurrentRevenue);

document.getElementById('importFile').addEventListener('change',e=>{
  const file=e.target.files?.[0];
  if(file)importBackup(file);
});

let toastTimer;
function toast(message){
  const el=document.getElementById('toast');
  el.textContent=message;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

window.addEventListener('storage',e=>{if(e.key===RECEIPTS_KEY||e.key===REVENUE_KEY)render()});
render();
</script>
